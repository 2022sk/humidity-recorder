<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>근로자 건강관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nanum+Square:wght@400;700;800&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@2.0/nanumsquare.css">
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  [x-cloak]{display:none!important}
  body{font-family:'Nanum Square','NanumSquare','Apple SD Gothic Neo','맑은 고딕',sans-serif;background:#f5f5f7}
  .card{background:white;border-radius:14px;padding:16px 18px;box-shadow:0 1px 8px rgba(0,0,0,.07);border:1px solid #e8e8ed}
  .btn-primary{background:#0071e3;color:white;border-radius:10px;padding:9px 16px;font-weight:700;font-size:.85rem;cursor:pointer;border:none;font-family:inherit;transition:background .15s}
  .btn-primary:hover{background:#005bbf}
  .btn-primary:disabled{background:#b0b0b5;cursor:not-allowed}
  .btn-secondary{background:#f2f2f7;color:#1c1c1e;border-radius:10px;padding:9px 14px;font-weight:700;font-size:.85rem;cursor:pointer;border:none;font-family:inherit;transition:background .15s}
  .btn-secondary:hover{background:#e5e5ea}
  .btn-danger{background:#ff3b30;color:white;border-radius:8px;padding:6px 12px;font-weight:700;font-size:.8rem;cursor:pointer;border:none;font-family:inherit;transition:background .15s}
  .btn-danger:hover{background:#d92e24}
  input,select,textarea{box-sizing:border-box;border:1px solid #d1d5db;border-radius:12px;padding:12px 16px 12px 14px!important;font-size:.85rem!important;line-height:1.4;width:100%;max-width:100%;min-width:0;outline:none;transition:border-color .15s;font-family:inherit}
  input[type="date"]{-webkit-appearance:none;appearance:none}
  input:focus,select:focus,textarea:focus{border-color:#0071e3;box-shadow:0 0 0 3px rgba(0,113,227,.12)}
  input::placeholder,textarea::placeholder{font-size:.85rem!important;color:#b0b0b8}
  .tab-btn{transition:all .2s;border-radius:9px;padding:8px 10px;font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap;border:none;background:transparent;font-family:inherit}
  .tab-btn.active{background:white;box-shadow:0 1px 6px rgba(0,0,0,.12);color:#0071e3}
  .tab-btn:not(.active){color:#86868b}
  .tab-btn:not(.active):hover{background:rgba(255,255,255,.6)}
  .badge-위험{background:#ff3b30;color:white;padding:2px 7px;border-radius:5px;font-size:.72rem;font-weight:800}
  .badge-경고{background:#ff9500;color:white;padding:2px 7px;border-radius:5px;font-size:.72rem;font-weight:800}
  .badge-주의{background:#ffcc00;color:#1c1c1e;padding:2px 7px;border-radius:5px;font-size:.72rem;font-weight:800}
  .badge-관심{background:#34c759;color:white;padding:2px 7px;border-radius:5px;font-size:.72rem;font-weight:800}
  .vul-tag{display:inline-block;color:white;border-radius:6px;padding:2px 8px;font-size:.68rem;font-weight:800;letter-spacing:-.01em}
  .worker-card{border:1px solid #e8e8ed;border-radius:14px;padding:14px 16px;background:white;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:box-shadow .15s}
  .worker-card:hover{box-shadow:0 2px 14px rgba(0,0,0,.09)}
  .worker-card.vulnerable{border-color:#ffb3b3;background:linear-gradient(135deg,#fff8f8,#fff)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0}
  @media(min-width:640px){.modal-bg{align-items:center;padding:16px}}
  .modal{background:white;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 -4px 40px rgba(0,0,0,.18)}
  @media(min-width:640px){.modal{border-radius:20px;padding:28px 24px;max-height:88vh}}
  .modal-handle{width:36px;height:4px;background:#d1d5db;border-radius:2px;margin:0 auto 16px}
  .section-label{font-size:.72rem;font-weight:800;color:#86868b;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
  .info-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .temp-ok{}
  .temp-warn{color:#ff9500;font-weight:800}
  .temp-danger{color:#ff3b30;font-weight:800}
  .exemption-alert{background:linear-gradient(135deg,#fff0f0,#ffe8e8);border:1.5px solid #ff4d4d;border-radius:12px;padding:10px 12px}
  .info-tag{display:inline-flex;align-items:center;background:#f2f2f7;color:#3c3c43;border-radius:6px;padding:2px 7px;font-size:.68rem;font-weight:700;letter-spacing:-.01em}
  /* 배치표 매트릭스 */
  .mx-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:14px;border:1px solid #e8e8ed;background:white}
  .mx-table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%}
  .mx-name{position:sticky;left:0;z-index:2;background:white;width:72px;min-width:72px;max-width:72px;padding:0 8px;font-size:.72rem;font-weight:700;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mx-head-name{position:sticky;left:0;z-index:3;background:#f9fafb;padding:8px 8px;font-size:.65rem;font-weight:800;color:#6b7280;border-bottom:1px solid #e8e8ed}
  .mx-head-loc{min-width:38px;width:38px;text-align:center;font-size:.65rem;font-weight:700;color:#6b7280;padding:6px 2px;border-bottom:1px solid #e8e8ed;white-space:nowrap;overflow:hidden}
  .mx-cell{width:38px;min-width:38px;height:38px;text-align:center;vertical-align:middle;cursor:pointer;border-bottom:1px solid #f3f4f6}
  .mx-cell:active{background:#f0f5ff}
  .mx-dot{width:24px;height:24px;border-radius:50%;background:#e5e7eb;margin:auto;transition:background .12s,transform .1s}
  .mx-cell:active .mx-dot{transform:scale(.85)}
  .mx-dot-blue{background:#2563eb}
  .mx-dot-green{background:#16a34a}
  .mx-vuln .mx-name{border-left:3px solid #ef4444;color:#dc2626}
  .mx-vuln .mx-name.bg-stripe{background:repeating-linear-gradient(135deg,#fff8f8,#fff8f8 6px,white 6px,white 12px)}
  .mx-section td{font-size:.62rem;font-weight:800;color:#9ca3af;padding:10px 10px 2px;letter-spacing:.04em;background:white}
  .mx-section .mx-name{background:white}
  .mx-even .mx-name{background:#fafafa}
  .mx-even td.mx-cell,.mx-even .mx-head-loc{background:#fafafa}
  .disease-tag{display:inline-flex;align-items:center;background:#fff3e8;color:#cc5500;border-radius:6px;padding:2px 7px;font-size:.68rem;font-weight:700;border:1px solid #ffd3a8}
  .company-header{font-size:.78rem;font-weight:800;color:#86868b;letter-spacing:.03em;padding:4px 2px;margin-bottom:4px;border-bottom:1px solid #e8e8ed}
  .modal-tab-btn{flex:1;padding:8px 4px;font-size:.82rem;font-weight:700;border:none;background:transparent;cursor:pointer;font-family:inherit;border-radius:8px;transition:all .15s;color:#86868b}
  .modal-tab-btn.active{background:white;color:#0071e3;box-shadow:0 1px 5px rgba(0,0,0,.1)}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:#f1f1f1}
  ::-webkit-scrollbar-thumb{background:#c7c7cc;border-radius:3px}
</style>
</head>

<body x-data="app()" x-init="init()" x-cloak>

<!-- ── 헤더 ── -->
<header class="sticky top-0 z-40" style="background:linear-gradient(135deg,#0062cc,#0071e3,#0096c7);box-shadow:0 2px 12px rgba(0,100,200,.2)">
  <div class="max-w-3xl lg:max-w-[1200px] mx-auto px-4" style="padding-top:14px;padding-bottom:14px">
    <div class="flex items-start justify-between">
      <div>
        <div class="flex items-center gap-2 mb-1">
          <span class="text-lg">🦺</span>
          <h1 class="font-extrabold text-white" style="font-size:1.2rem;letter-spacing:-.02em">근로자 건강관리</h1>
        </div>
        <div class="pl-7">
          <template x-if="siteCode">
            <div class="flex items-center gap-1.5 flex-wrap">
              <span class="text-xs px-1.5 py-0.5 rounded font-bold"
                    style="background:rgba(255,255,255,.2);color:white;border:1px solid rgba(255,255,255,.3)"
                    x-text="siteCode"></span>
              <span x-show="siteName" class="text-xs px-1.5 py-0.5 rounded font-bold"
                    style="background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.25)"
                    x-text="siteName"></span>
              <span x-show="role==='company' && company" class="text-xs"
                    style="color:rgba(255,255,255,.75)" x-text="company"></span>
            </div>
          </template>
          <template x-if="!siteCode">
            <span class="text-xs" style="color:rgba(255,255,255,.6)">현장코드를 입력하세요</span>
          </template>
        </div>
      </div>
      <div class="flex items-center gap-2 mt-0.5">
        <template x-if="authed && mode !== 'health'">
          <button @click="logout()" class="text-xs px-3 py-1.5 rounded-lg font-bold"
                  style="background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.25)">로그아웃</button>
        </template>
        <a :href="API_BASE||'/#'" class="text-xs px-3 py-1.5 rounded-lg font-bold"
           style="background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.25)">🌡 체감온도</a>
      </div>
    </div>
  </div>
</header>

<div class="max-w-3xl lg:max-w-[1200px] mx-auto p-3 pb-10 space-y-3">

<!-- ══ 로그인 ══ -->
<template x-if="!authed && mode !== 'health'">
  <div class="max-w-sm mx-auto mt-8">
    <div class="card">
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-3"
             style="background:linear-gradient(135deg,#0062cc,#0096c7)">
          <span class="text-3xl">🦺</span>
        </div>
        <div class="font-extrabold text-gray-800" style="font-size:1.15rem">근로자 건강관리</div>
        <div class="text-xs text-gray-400 mt-1">현장코드와 역할을 선택하세요</div>
      </div>
      <div class="space-y-3">
        <div>
          <div class="flex items-center gap-2 mb-1">
            <label class="text-xs font-bold text-gray-500">현장코드</label>
            <span x-show="siteLocked" x-cloak class="text-xs bg-blue-100 text-blue-600 rounded-full px-2 py-0.5 font-bold">🔒 현장 고정</span>
          </div>
          <input type="text" x-model="siteCode" placeholder="예: J881" class="mt-1"
                 :readonly="siteLocked"
                 :class="siteLocked ? 'bg-gray-50 text-gray-700 font-bold cursor-not-allowed' : ''"
                 @input="!siteLocked && (siteCode=siteCode.toUpperCase(), siteCode.length>=3 && loadLoginCompanies())"
                 @change="loadLoginCompanies()">
        </div>
        <div>
          <label class="text-xs font-bold text-gray-500">접속 유형</label>
          <div class="grid grid-cols-2 gap-2 mt-1">
            <button @click="loginRole='company'; loadLoginCompanies()"
                    :class="loginRole==='company' ? 'btn-primary' : 'btn-secondary'"
                    class="py-2.5 text-sm rounded-xl font-bold">🏢 업체</button>
            <button @click="loginRole='admin'"
                    :class="loginRole==='admin' ? 'btn-primary' : 'btn-secondary'"
                    class="py-2.5 text-sm rounded-xl font-bold">🔑 관리자</button>
          </div>
        </div>
        <template x-if="loginRole==='company'">
          <div x-data="{ open: false }">
            <label class="text-xs font-bold text-gray-500">업체명</label>
            <div class="relative mt-1">
              <button type="button" @click="if(!loginCompanies.length){ await loadLoginCompanies() }; open = !open"
                      class="w-full text-left px-4 py-3 rounded-xl border border-gray-300 bg-white text-sm font-bold text-gray-700 flex items-center justify-between"
                      style="font-family:inherit">
                <span :class="loginCompany ? 'text-gray-800' : 'text-gray-400'"
                      x-text="loginCompany || '업체를 선택하세요'"></span>
                <span class="text-gray-400 text-xs" x-text="open ? '▲' : '▼'"></span>
              </button>
              <div x-show="open" @click.outside="open = false"
                   class="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-xl shadow-xl overflow-y-auto"
                   style="max-height:200px">
                <template x-for="c in loginCompanies" :key="c">
                  <button type="button" @click="loginCompany = c; open = false"
                          class="w-full text-left px-4 py-3 text-sm font-bold text-gray-700 border-b border-gray-100 last:border-0"
                          style="font-family:inherit"
                          :class="loginCompany===c ? 'bg-blue-50 text-blue-700' : 'hover:bg-gray-50'"
                          x-text="c"></button>
                </template>
              </div>
            </div>
          </div>
        </template>
        <div>
          <label class="text-xs font-bold text-gray-500">PIN</label>
          <input type="password" x-model="loginPin" placeholder="PIN 번호 입력"
                 @keydown.enter="doLogin()" class="mt-1">
        </div>
        <template x-if="loginError">
          <div class="text-red-500 text-xs text-center font-bold py-1" x-text="loginError"></div>
        </template>
        <button @click="doLogin()" class="btn-primary w-full py-3" :disabled="loginLoading">
          <span x-text="loginLoading ? '확인 중...' : '접속하기'"></span>
        </button>
      </div>
    </div>
  </div>
</template>

<!-- ══ 관리자 화면 ══ -->
<template x-if="authed && role==='admin'">
  <div>
    <!-- 탭 -->
    <div class="flex gap-1 bg-gray-100 p-1 rounded-xl mb-3">
      <button class="tab-btn flex-1" :class="{active:adminTab==='workers'}" @click="adminTab='workers';loadWorkers()">👷 근로자</button>
      <button class="tab-btn flex-1" :class="{active:adminTab==='attendance'}" @click="adminTab='attendance';loadAttendance()">📋 출근</button>
      <button class="tab-btn flex-1" :class="{active:adminTab==='map'}" @click="adminTab='map';loadMapAttendance()">🗺 도면</button>
      <button class="tab-btn flex-1" :class="{active:adminTab==='pins'}" @click="adminTab='pins';loadCompanyPins();loadCompanyVisibility()">🔐 업체PIN</button>
    </div>

    <!-- 근로자 탭 -->
    <div x-show="adminTab==='workers'">
      <div class="flex items-center justify-between mb-3">
        <div class="text-sm font-bold text-gray-700">
          <span class="text-blue-600" x-text="filteredWorkers.filter(w=>w.deploy_status!=='inactive').length+'명'"></span>
          <span class="text-gray-400 text-xs ml-1" x-text="workers.length > filteredWorkers.filter(w=>w.deploy_status!=='inactive').length ? '/ 전체 '+workers.length : ''"></span>
        </div>
        <div class="flex gap-1.5 flex-wrap justify-end">
          <button @click="vulnListModal.show=true"
                  class="btn-secondary text-xs py-1.5">🔴 취약명단</button>
          <button @click="pasteModal.show=true;pasteModal.raw='';pasteModal.headers=[];pasteModal.rows=[];pasteModal.preview=[];pasteModal.result=null"
                  class="btn-secondary text-xs py-1.5">📋 붙여넣기</button>
          <button @click="recalcVtypes()" class="btn-secondary text-xs py-1.5">취약구분</button>
          <button @click="openWorkerModal(null)" class="btn-primary text-xs py-1.5">+ 추가</button>
        </div>
      </div>

      <!-- 검색 + 필터 -->
      <div class="mb-3">
        <!-- 검색바 한 줄 -->
        <div class="flex gap-2 mb-1.5">
          <div class="flex items-center flex-1 rounded-xl border border-gray-200 bg-white" style="padding:0 10px;gap:6px">
            <svg class="flex-shrink-0 text-gray-400" style="width:14px;height:14px;min-width:14px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" x-model="workerSearch" placeholder="이름 검색"
                   class="flex-1 text-xs bg-transparent"
                   style="border:none;outline:none;padding:8px 0;min-width:0">
            <button x-show="workerSearch" @click="workerSearch=''"
                    class="flex-shrink-0 text-gray-400 text-xs leading-none">✕</button>
          </div>
          <button @click="workerFilterOpen=!workerFilterOpen"
                  class="flex-shrink-0 flex items-center gap-1 text-xs font-bold px-3 rounded-xl border transition-all"
                  :class="(workerEduFrom||workerEduTo||workerFilter||workerShowFilter!=='all')
                    ? 'bg-blue-600 text-white border-blue-600'
                    : 'bg-white text-gray-600 border-gray-200'">
            <span>필터</span>
            <span x-text="workerFilterOpen ? '▲' : '▼'" class="text-xs opacity-70"></span>
            <span x-show="(workerEduFrom||workerEduTo||workerFilter||workerShowFilter!=='all')"
                  class="bg-white text-blue-600 rounded-full font-black leading-none"
                  style="font-size:10px;padding:0 4px"
                  x-text="[workerEduFrom||workerEduTo?'투입일':'', workerFilter, workerShowFilter!=='all'?workerShowFilter:''].filter(Boolean).length">
            </span>
          </button>
        </div>
        <!-- 펼침 필터 패널 -->
        <div x-show="workerFilterOpen" x-transition:enter="transition ease-out duration-150"
             x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0"
             class="bg-gray-50 border border-gray-200 rounded-xl p-3 space-y-2">
          <!-- 취약/업체 -->
          <div class="flex gap-2">
            <select x-model="workerShowFilter"
                    class="flex-1 text-xs border border-gray-200 rounded-lg px-2 py-1.5 bg-white font-bold text-gray-700">
              <option value="all">전체</option>
              <option value="vuln">🔴 취약만</option>
              <option value="attend_vuln">오늘출근취약</option>
            </select>
            <select x-model="workerFilter"
                    class="flex-1 text-xs border border-gray-200 rounded-lg px-2 py-1.5 bg-white text-gray-700">
              <option value="">전체 업체</option>
              <template x-for="c in workerCompanies" :key="c">
                <option :value="c" x-text="c"></option>
              </template>
            </select>
          </div>
          <!-- 투입일 기간 -->
          <div class="flex items-center gap-1.5">
            <span class="text-xs text-gray-500 font-bold flex-shrink-0">투입일</span>
            <input type="date" x-model="workerEduFrom"
                   class="flex-1 text-xs border border-gray-200 rounded-lg bg-white" style="padding:5px 6px">
            <span class="text-xs text-gray-400">~</span>
            <input type="date" x-model="workerEduTo"
                   class="flex-1 text-xs border border-gray-200 rounded-lg bg-white" style="padding:5px 6px">
          </div>
          <!-- 초기화 -->
          <button x-show="workerEduFrom||workerEduTo||workerFilter||workerShowFilter!=='all'"
                  @click="workerEduFrom='';workerEduTo='';workerFilter='';workerShowFilter='all'"
                  class="text-xs text-red-400 font-bold">초기화</button>
        </div>
      </div>

      <!-- 검색 결과 평면 목록 -->
      <template x-if="workerSearch.trim() || workerEduFrom || workerEduTo">
        <div class="space-y-2">
          <div x-show="filteredWorkers.length === 0" class="text-center text-gray-400 py-6 text-sm">검색 결과 없음</div>
          <template x-for="w in filteredWorkers" :key="w.id">
            <div class="worker-card" :class="[w.is_vulnerable&&w.deploy_status!=='inactive'?'vulnerable':'', w.deploy_status==='inactive'?'opacity-40':'']">
              <div class="flex items-center justify-between gap-2">
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-1.5 flex-wrap">
                    <span x-show="w.deploy_status==='inactive'" class="text-xs font-black text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded">미투입</span>
                    <span x-show="w.h_wallet_missing" class="text-xs font-bold text-amber-700 bg-amber-100 px-1.5 py-0.5 rounded">H-미기입</span>
                    <span x-show="hasOtherVuln(w)&&w.deploy_status!=='inactive'" class="font-black text-sm leading-none">🔴</span>
                    <span x-show="isElderlyVuln(w)&&w.deploy_status!=='inactive'" class="font-black text-sm leading-none">🟠</span>
                    <span class="font-extrabold text-gray-800" x-text="w.name_korean||w.name"></span>
                    <span class="text-xs text-gray-400" x-text="w.company+(w.job_type?' · '+w.job_type:'')"></span>
                  </div>
                  <div class="flex flex-wrap gap-1 mt-0.5">
                    <span x-show="w.education_date" class="info-tag" style="background:#eff6ff;color:#1d4ed8" x-text="'투입일 '+w.education_date"></span>
                    <template x-for="vt in (w.vulnerability_types||[])" :key="vt">
                      <span class="vul-tag" :style="vtypeColor(vt)" x-text="vt"></span>
                    </template>
                  </div>
                </div>
                <div class="flex gap-1 flex-shrink-0">
                  <button @click="toggleDeployStatus(w, loadWorkers.bind(this))"
                          :class="w.deploy_status==='inactive'?'btn-primary':'btn-secondary'"

        <div class="flex items-center gap-1.5 cursor-pointer select-none py-1 rounded-lg hover:bg-gray-50"
             @click="inactiveCollapsed = !inactiveCollapsed">
          <span class="text-gray-400 text-xs flex-shrink-0"
                :style="inactiveCollapsed ? 'display:inline-block;transform:rotate(-90deg);transition:transform .15s' : 'display:inline-block;transition:transform .15s'">▾</span>
          <span class="text-xs font-extrabold text-gray-400">⛔ 미투입 근로자</span>
          <span class="text-xs text-gray-400"
                x-text="'('+companyWorkers.filter(w=>w.deploy_status==='inactive').length+'명)'"></span>
        </div>
        <div x-show="!inactiveCollapsed" class="space-y-1.5 mt-1">
          <template x-for="w in companyWorkers.filter(w=>w.deploy_status==='inactive')" :key="w.id">
            <div class="worker-card opacity-50">
              <div class="flex items-center gap-3">
                <div class="w-5 h-5 rounded border border-gray-300 bg-gray-100 flex-shrink-0"></div>
                <div class="flex-1 min-w-0">
                  <span class="font-bold text-gray-500 line-through" x-text="w.name_korean||w.name"></span>
                  <span x-show="w.education_date" class="text-xs text-gray-400 ml-1"
                        x-text="'투입 '+w.education_date"></span>
                </div>
                <button @click="toggleDeployStatus(w, loadCompanyWorkers.bind(this))"
                        class="btn-primary text-xs py-1 px-2.5 flex-shrink-0">투입 복귀</button>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <div x-show="companyWorkers.length===0" class="text-center text-gray-400 py-8 text-sm">등록된 근로자가 없습니다</div>
  </div>
</template>

<!-- ══ 건강기록 패널 (체감온도 앱에서 연계) ══ -->
<template x-if="mode==='health'">
  <div>
    <!-- 헤더 정보 -->
    <div class="card mb-3">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <div>
          <div class="font-extrabold text-gray-800 text-sm" x-text="healthDate + ' · ' + healthSlot"></div>
          <div class="text-xs text-gray-500 mt-0.5" x-text="healthCompanyFilter || '전체 현장'"></div>
        </div>
        <div class="flex items-center gap-2">
          <span x-show="heatLevel" :class="'badge-'+heatLevel" x-text="heatLevel"></span>
          <span x-show="feelsLike" class="font-bold text-gray-700" x-text="feelsLike+'°C'"></span>
        </div>
      </div>
      <template x-if="heatLevel==='관심'||heatLevel==='주의'">
        <div class="mt-2 p-2 rounded-lg text-xs font-bold" style="background:#fff3cd;color:#856404">
          🔴 취약근로자 시간당 15분 휴식 | 일반 10분 휴식 적용
        </div>
      </template>
      <template x-if="heatLevel==='경고'">
        <div class="mt-2 p-2 rounded-lg text-xs font-bold" style="background:#ffe0cc;color:#7c3400">
          🔴 취약근로자 옥외작업 금지 | 시간당 15분 이상 휴식
        </div>
      </template>
      <template x-if="heatLevel==='위험'">
        <div class="mt-2 p-2 rounded-lg text-xs font-bold" style="background:#ffd0d0;color:#7c0000">
          🔴 취약근로자 즉시 작업 중단 · 그늘 이동 조치
        </div>
      </template>
    </div>

    <!-- PIN 확인 (미인증 시) -->
    <template x-if="!authed">
      <div class="card max-w-sm mx-auto">
        <div class="text-sm font-bold text-gray-700 mb-3">관리자 PIN 확인</div>
        <input type="password" x-model="loginPin" placeholder="관리자 PIN"
               @keydown.enter="verifyHealthPin()" class="mb-2">
        <template x-if="loginError">
          <div class="text-red-500 text-xs mb-2" x-text="loginError"></div>
        </template>
        <button @click="verifyHealthPin()" class="btn-primary w-full" :disabled="loginLoading">
          <span x-text="loginLoading ? '확인 중...' : '확인'"></span>
        </button>
      </div>
    </template>

    <!-- 업체 전환 탭 (인증 후 + 2개 이상 업체) -->
    <template x-if="authed && healthCompanies.length > 1">
      <div class="flex gap-1 flex-nowrap overflow-x-auto pb-1 mb-2" style="-webkit-overflow-scrolling:touch;scrollbar-width:none">
        <button @click="switchHealthCompany('')"
                :class="healthCompanyFilter==='' ? 'btn-primary' : 'btn-secondary'"
                class="text-xs py-1.5 px-3 flex-shrink-0">전체</button>
        <template x-for="c in healthCompanies" :key="c">
          <button @click="switchHealthCompany(c)"
                  :class="healthCompanyFilter===c ? 'btn-primary' : 'btn-secondary'"
                  class="text-xs py-1.5 px-3 flex-shrink-0" x-text="c"></button>
        </template>
      </div>
    </template>

    <!-- 인증 후 건강기록 -->
    <template x-if="authed">
      <div class="space-y-3">
        <!-- 체온 기록 테이블 -->
        <div class="card">
          <div class="text-sm font-extrabold text-gray-700 mb-3">체온 측정 기록</div>
          <div x-show="healthAttendance.length===0" class="text-gray-400 text-sm text-center py-4">
            오늘 출근 체크된 근로자가 없습니다
          </div>
          <div class="space-y-2">
            <!-- 취약근로자 -->
            <template x-if="healthAttendance.filter(a=>a.is_vulnerable).length > 0">
              <div>
                <div class="text-xs font-extrabold text-red-600 mb-2">🔴 취약근로자</div>
                <template x-for="a in healthAttendance.filter(a=>a.is_vulnerable)" :key="a.worker_id">
                  <div class="rounded-xl p-3 mb-2" style="background:#fff8f8;border:1px solid #ffc9c9">
                    <div class="flex items-center gap-2 mb-2 flex-wrap">
                      <span class="font-bold text-gray-800" x-text="a.name_korean||a.name"></span>
                      <span x-show="!healthCompanyFilter && a.company" class="info-tag" x-text="a.company"></span>
                      <template x-for="vt in a.vulnerability_types" :key="vt">
                        <span class="vul-tag" :style="vtypeColor(vt)" x-text="vt"></span>
                      </template>
                      <template x-if="parseLocations(a.work_location).length > 0">
                        <span class="text-xs px-1.5 py-0.5 rounded font-bold" style="background:#e8f4ff;color:#1a6fb5;border:1px solid #b3d6f5"
                              x-text="'📍 '+parseLocations(a.work_location).join(', ')"></span>
                      </template>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                      <div>
                        <label class="text-xs text-gray-500 font-bold">체온(°C)</label>
                        <input type="number" step="0.1" placeholder="36.5"
                               :value="healthRecs[a.worker_id]?.body_temp||''"
                               @input="setHealthRec(a.worker_id,'body_temp',$event.target.value)"
                               :class="getTempClass(healthRecs[a.worker_id]?.body_temp)"
                               class="mt-0.5" style="padding:6px 8px!important;font-size:.85rem!important">
                      </div>
                      <div>
                        <label class="text-xs text-gray-500 font-bold">측정시각</label>
                        <input type="text" placeholder="09:00"
                               :value="healthRecs[a.worker_id]?.measure_time||''"
                               @input="setHealthRec(a.worker_id,'measure_time',$event.target.value)"
                               @change="formatTime(a.worker_id)"
                               class="mt-0.5" style="padding:6px 8px!important;font-size:.85rem!important">
                      </div>
                      <div>
                        <label class="text-xs text-gray-500 font-bold">건강상태</label>
                        <select :value="healthRecs[a.worker_id]?.health_status||'양호'"
                                @change="setHealthRec(a.worker_id,'health_status',$event.target.value)"
                                class="mt-0.5" style="padding:6px 4px!important;font-size:.8rem!important">
                          <option>양호</option>
                          <option>주의</option>
                          <option>불량</option>
                        </select>
                      </div>
                    </div>
                    <!-- 작업열외권: 체온 38도 이상 또는 건강상태 불량 -->
                    <template x-if="parseFloat(healthRecs[a.worker_id]?.body_temp)>=38 || healthRecs[a.worker_id]?.health_status==='불량'">
                      <div class="mt-2 p-2 rounded-lg flex items-center justify-between gap-2" style="background:#fff0f0;border:1px solid #ff4d4d">
                        <div class="text-xs font-bold text-red-700">🚨 체온 38°C 이상 또는 이상증상 — 작업열외 조치 필요</div>
                        <button @click="openExemptionLink(a)" class="flex-shrink-0 text-xs font-bold rounded-lg px-2 py-1 border-0 cursor-pointer" style="background:#ff4d4d;color:white">
                          📋 작업열외권
                        </button>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
            <!-- 일반 근로자 -->
            <template x-if="healthAttendance.filter(a=>!a.is_vulnerable).length > 0">
              <div>
                <div class="text-xs font-extrabold text-gray-500 mb-2">일반 근로자</div>
                <template x-for="a in healthAttendance.filter(a=>!a.is_vulnerable)" :key="a.worker_id">
                  <div class="rounded-xl p-3 mb-2" style="background:#f9f9fb;border:1px solid #e8e8ed">
                    <div class="flex items-center gap-2 mb-2 flex-wrap">
                      <span class="font-bold text-gray-800 text-sm" x-text="a.name_korean||a.name"></span>
                      <span x-show="!healthCompanyFilter && a.company" class="info-tag" x-text="a.company"></span>
                      <template x-if="parseLocations(a.work_location).length > 0">
                        <span class="text-xs px-1.5 py-0.5 rounded font-bold" style="background:#f0f4ff;color:#3b5bdb;border:1px solid #c5d0fa"
                              x-text="'📍 '+parseLocations(a.work_location).join(', ')"></span>
                      </template>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                      <div>
                        <label class="text-xs text-gray-500 font-bold">체온(°C)</label>
                        <input type="number" step="0.1" placeholder="36.5"
                               :value="healthRecs[a.worker_id]?.body_temp||''"
                               @input="setHealthRec(a.worker_id,'body_temp',$event.target.value)"
                               :class="getTempClass(healthRecs[a.worker_id]?.body_temp)"
                               class="mt-0.5" style="padding:6px 8px!important;font-size:.85rem!important">
                      </div>
                      <div>
                        <label class="text-xs text-gray-500 font-bold">측정시각</label>
                        <input type="text" placeholder="09:00"
                               :value="healthRecs[a.worker_id]?.measure_time||''"
                               @input="setHealthRec(a.worker_id,'measure_time',$event.target.value)"
                               @change="formatTime(a.worker_id)"
                               class="mt-0.5" style="padding:6px 8px!important;font-size:.85rem!important">
                      </div>
                      <div>
                        <label class="text-xs text-gray-500 font-bold">건강상태</label>
                        <select :value="healthRecs[a.worker_id]?.health_status||'양호'"
                                @change="setHealthRec(a.worker_id,'health_status',$event.target.value)"
                                class="mt-0.5" style="padding:6px 4px!important;font-size:.8rem!important">
                          <option>양호</option>
                          <option>주의</option>
                          <option>불량</option>
                        </select>
                      </div>
                    </div>
                    <template x-if="parseFloat(healthRecs[a.worker_id]?.body_temp)>=38 || healthRecs[a.worker_id]?.health_status==='불량'">
                      <div class="mt-2 p-2 rounded-lg flex items-center justify-between gap-2" style="background:#fff0f0;border:1px solid #ff4d4d">
                        <div class="text-xs font-bold text-red-700">🚨 체온 38°C 이상 또는 이상증상 — 작업열외 조치 필요</div>
                        <button @click="openExemptionLink(a)" class="flex-shrink-0 text-xs font-bold rounded-lg px-2 py-1 border-0 cursor-pointer" style="background:#ff4d4d;color:white">
                          📋 작업열외권
                        </button>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>

        <!-- 증빙사진 (특정 업체 선택 시만) -->
        <div class="card" x-show="healthCompanyFilter">
          <div class="text-sm font-extrabold text-gray-700 mb-3">증빙 사진</div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <!-- 휴식 증빙 -->
            <div>
              <div class="text-xs font-bold text-gray-600 mb-2">🛋 휴식 증빙사진</div>
              <label class="block border-2 border-dashed border-gray-300 rounded-xl p-4 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-all">
                <input type="file" accept="image/*" class="hidden" @change="uploadHealthPhoto('휴식증빙', $event)">
                <div class="text-2xl mb-1">📷</div>
                <div class="text-xs text-gray-400">탭하여 사진 추가</div>
              </label>
              <div class="mt-2 grid grid-cols-3 gap-1">
                <template x-for="p in healthPhotos.filter(p=>p.photo_type==='휴식증빙')" :key="p.photo_id">
                  <div class="relative">
                    <img :src="API_BASE+'/uploads/'+p.photo_id" class="w-full aspect-square object-cover rounded-lg border border-gray-200">
                    <button @click="deleteHealthPhoto(p)" class="absolute top-0.5 right-0.5 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs leading-none">✕</button>
                  </div>
                </template>
              </div>
            </div>
            <!-- 보냉장구 -->
            <div>
              <div class="text-xs font-bold text-gray-600 mb-2">🧊 보냉장구 착용사진</div>
              <label class="block border-2 border-dashed border-gray-300 rounded-xl p-4 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-all">
                <input type="file" accept="image/*" class="hidden" @change="uploadHealthPhoto('보냉장구', $event)">
                <div class="text-2xl mb-1">📷</div>
                <div class="text-xs text-gray-400">탭하여 사진 추가</div>
              </label>
              <div class="mt-2 grid grid-cols-3 gap-1">
                <template x-for="p in healthPhotos.filter(p=>p.photo_type==='보냉장구')" :key="p.photo_id">
                  <div class="relative">
                    <img :src="API_BASE+'/uploads/'+p.photo_id" class="w-full aspect-square object-cover rounded-lg border border-gray-200">
                    <button @click="deleteHealthPhoto(p)" class="absolute top-0.5 right-0.5 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs leading-none">✕</button>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>

        <!-- 저장 -->
        <button @click="saveHealthRecords()" class="btn-primary w-full py-3 text-base" :disabled="healthSaving">
          <span x-text="healthSaving ? '저장 중...' : '💾 건강기록 저장'"></span>
        </button>
        <div x-show="healthSaved" class="text-center text-green-600 font-bold text-sm py-2">✅ 저장되었습니다</div>
      </div>
    </template>
  </div>
</template>

</div>

<!-- ══ 모달: 근로자 편집 (기본정보 + 건강진단 탭) ══ -->
<div x-show="workerModal.show" x-cloak class="modal-bg" @click.self="workerModal.show=false">
  <div class="modal">
    <div class="modal-handle sm:hidden"></div>
    <!-- 헤더 -->
    <div class="flex items-center justify-between mb-4">
      <div>
        <div class="font-extrabold text-gray-800" style="font-size:1.05rem"
             x-text="workerModal.editing ? (workerModal.editing.name_korean||workerModal.editing.name) : '근로자 추가'"></div>
        <div class="text-xs text-gray-400 mt-0.5" x-show="workerModal.editing" x-text="workerModal.editing?.company"></div>
      </div>
      <button @click="workerModal.show=false" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 text-lg leading-none">✕</button>
    </div>
    <!-- 탭 -->
    <div class="flex gap-1 p-1 rounded-xl mb-4" style="background:#f2f2f7">
      <button class="modal-tab-btn" :class="{active:workerModal.tab==='info'}" @click="workerModal.tab='info'">📋 기본정보</button>
      <button class="modal-tab-btn" :class="{active:workerModal.tab==='exam'}" @click="workerModal.tab='exam'"
              :disabled="!workerModal.editing">🩺 건강진단</button>
    </div>

    <!-- ── 기본정보 탭 ── -->
    <div x-show="workerModal.tab==='info'" class="space-y-4">
      <div>
        <div class="section-label">기본 정보</div>
        <div class="space-y-2.5 p-3 rounded-xl" style="background:#f9f9fb;border:1px solid #e8e8ed">
          <div class="grid grid-cols-3 gap-2.5">
            <div>
              <label class="text-xs font-bold text-gray-500">식별코드</label>
              <input type="text" x-model="workerModal.data.worker_code" placeholder="W-001" class="mt-1">
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500">신규교육일</label>
              <input type="date" x-model="workerModal.data.education_date" @change="autoFillVtypes()" class="mt-1">
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500">건강진단일</label>
              <input type="date" x-model="workerModal.data.last_exam_date" class="mt-1">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2.5">
            <div>
              <label class="text-xs font-bold text-gray-500">이름(영문/외국어) <span class="text-red-500">*</span></label>
              <input type="text" x-model="workerModal.data.name" placeholder="HONG GIL DONG" class="mt-1">
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500">근로자명(한글)</label>
              <input type="text" x-model="workerModal.data.name_korean" placeholder="홍길동" class="mt-1">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2.5">
            <div x-data="{ companyOpen: false }" class="relative">
              <label class="text-xs font-bold text-gray-500">협력사명 <span class="text-red-500">*</span></label>
              <input type="text" x-model="workerModal.data.company" placeholder="업체명 선택 또는 입력"
                     class="mt-1"
                     @focus="companyOpen = workerCompanies.length > 0"
                     @input="companyOpen = workerCompanies.length > 0"
                     @keydown.escape="companyOpen = false">
              <div x-show="companyOpen" @click.outside="companyOpen = false"
                   class="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-xl shadow-lg overflow-y-auto"
                   style="max-height:180px">
                <template x-for="c in workerCompanies.filter(c => !workerModal.data.company || c.includes(workerModal.data.company))" :key="c">
                  <button type="button"
                          @click="workerModal.data.company = c; companyOpen = false"
                          class="w-full text-left px-4 py-2.5 text-sm hover:bg-blue-50 font-bold text-gray-700"
                          x-text="c"></button>
                </template>
              </div>
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500">직종</label>
              <input type="text" x-model="workerModal.data.job_type" placeholder="형틀목수, 철근공…" class="mt-1">
            </div>
          </div>
        </div>
      </div>
      <div>
        <div class="section-label">신원 정보</div>
        <div class="space-y-2.5 p-3 rounded-xl" style="background:#f9f9fb;border:1px solid #e8e8ed">
          <div class="grid grid-cols-3 gap-2.5">
            <div>
              <label class="text-xs font-bold text-gray-500">국가</label>
              <input type="text" x-model="workerModal.data.nationality" placeholder="대한민국" class="mt-1">
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500">생년월일</label>
              <input type="date" x-model="workerModal.data.birth_date" @change="autoFillVtypes()" class="mt-1">
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500">성별</label>
              <select x-model="workerModal.data.gender" class="mt-1">
                <option value="">선택</option>
                <option value="남자">남자</option>
                <option value="여자">여자</option>
              </select>
            </div>
          </div>
          <div>
            <label class="text-xs font-bold text-gray-500">연락처</label>
            <input type="tel" x-model="workerModal.data.phone" placeholder="010-0000-0000" class="mt-1">
          </div>
          <div class="grid grid-cols-2 gap-2.5">
            <div>
              <label class="text-xs font-bold text-gray-500">체류자격</label>
              <input type="text" x-model="workerModal.data.residence_status" placeholder="E-9, H-2…" class="mt-1">
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500">체류만료일</label>
              <input type="date" x-model="workerModal.data.residence_expiry" class="mt-1">
            </div>
          </div>
        </div>
      </div>
      <div>

<div x-show="vulnListModal.show" x-cloak class="modal-bg" @click.self="vulnListModal.show=false">
  <div class="modal" style="max-width:520px;width:100%;padding:0;overflow:hidden">

    <!-- 인쇄용 헤더 -->
    <div style="background:linear-gradient(135deg,#dc2626,#b91c1c);padding:18px 20px 14px">
      <div class="flex items-start justify-between">
        <div>
          <div class="text-white font-extrabold" style="font-size:1.05rem">🔴 취약근로자 현황</div>
          <div class="text-red-200 text-xs mt-0.5" x-text="siteCode + ' · ' + new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})"></div>
        </div>
        <button @click="vulnListModal.show=false" class="text-red-200 hover:text-white text-xl leading-none mt-0.5">✕</button>
      </div>
      <div class="flex gap-4 mt-3">
        <div class="text-center">
          <div class="text-white font-extrabold text-xl" x-text="workers.filter(w=>w.is_vulnerable&&w.deploy_status!=='inactive').length"></div>
          <div class="text-red-200 text-xs">취약 총원</div>
        </div>
        <div class="text-center">
          <div class="text-white font-extrabold text-xl"
               x-text="workers.filter(w=>w.is_vulnerable&&w.deploy_status!=='inactive'&&(workerLocations[w.id]||[]).length>0).length"></div>
          <div class="text-red-200 text-xs">위치 배정</div>
        </div>
        <div class="text-center">
          <div class="text-white font-extrabold text-xl"
               x-text="workers.filter(w=>w.is_vulnerable&&w.deploy_status!=='inactive'&&(workerLocations[w.id]||[]).length===0).length"></div>
          <div class="text-red-200 text-xs">위치 미배정</div>
        </div>
      </div>
    </div>

    <!-- 근로자 목록 -->
    <div style="max-height:55vh;overflow-y:auto;padding:12px 16px">
      <template x-if="workers.filter(w=>w.is_vulnerable&&w.deploy_status!=='inactive').length===0">
        <div class="text-center text-gray-400 py-8 text-sm">취약근로자가 없습니다</div>
      </template>
      <template x-for="(w,i) in workers.filter(w=>w.is_vulnerable&&w.deploy_status!=='inactive')" :key="w.id">
        <div class="flex items-start gap-3 py-2.5" :class="i>0?'border-t border-gray-100':''">
          <!-- 번호 -->
          <div class="flex-shrink-0 w-6 h-6 rounded-full bg-red-100 text-red-600 font-extrabold text-xs flex items-center justify-center"
               x-text="i+1"></div>
          <!-- 정보 -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1.5 flex-wrap">
              <span x-show="hasOtherVuln(w)" class="text-sm leading-none">🔴</span>
              <span x-show="isElderlyVuln(w)&&!hasOtherVuln(w)" class="text-sm leading-none">🟠</span>
              <span class="font-extrabold text-gray-900" x-text="w.name_korean||w.name"></span>
              <span class="text-xs text-gray-400" x-text="w.company+(w.job_type?' · '+w.job_type:'')"></span>
            </div>
            <!-- 취약구분 뱃지 -->
            <div class="flex flex-wrap gap-1 mt-1">
              <template x-for="vt in (w.vulnerability_types||[])" :key="vt">
                <span class="vul-tag" :style="vtypeColor(vt)" x-text="vt"></span>
              </template>
            </div>
          </div>
          <!-- 위치 -->
          <div class="flex-shrink-0 text-right">
            <template x-if="(workerLocations[w.id]||[]).length>0">
              <div class="flex flex-wrap gap-1 justify-end">
                <template x-for="loc in (workerLocations[w.id]||[])" :key="loc">
                  <span class="text-xs font-bold px-1.5 py-0.5 rounded-md"
                        style="background:#dbeafe;color:#1d4ed8" x-text="loc"></span>
                </template>
              </div>
            </template>
            <template x-if="!(workerLocations[w.id]||[]).length">
              <span class="text-xs text-gray-300">미배정</span>
            </template>
          </div>
        </div>
      </template>
    </div>

    <!-- 하단 버튼 -->
    <div class="flex gap-2 p-3 border-t border-gray-100 bg-gray-50">
      <button @click="copyVulnList()"
              class="flex-1 btn-secondary text-sm font-bold py-2.5">📋 텍스트 복사</button>
      <button @click="vulnListModal.show=false"
              class="btn-secondary text-sm py-2.5 px-4">닫기</button>
    </div>
  </div>
</div>

<div x-show="pasteModal.show" x-cloak class="modal-bg" @click.self="pasteModal.show=false">
  <div class="modal" style="max-width:900px;width:100%">
    <div class="modal-handle sm:hidden"></div>
    <div class="flex items-center justify-between mb-4">
      <div>
        <div class="font-extrabold text-gray-800" style="font-size:1.1rem">📋 일괄 등록 — 붙여넣기</div>
        <div class="text-xs text-gray-400 mt-0.5">Excel에서 셀을 복사(Ctrl+C) 후 아래 영역에 붙여넣기(Ctrl+V)하세요</div>
      </div>
      <button @click="pasteModal.show=false" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 text-lg leading-none flex-shrink-0">✕</button>
    </div>

    <!-- 결과 표시 -->
    <template x-if="pasteModal.result">
      <div class="mb-4 p-3 rounded-xl font-bold text-sm"
           :class="pasteModal.result.errors.length ? 'bg-yellow-50 border border-yellow-300 text-yellow-800' : 'bg-green-50 border border-green-300 text-green-800'">
        <div x-text="'✅ ' + pasteModal.result.success + '명 등록 완료'"></div>
        <template x-if="pasteModal.result.errors.length">
          <div class="text-xs mt-1 font-normal" x-text="'오류 ' + pasteModal.result.errors.length + '건: ' + pasteModal.result.errors.slice(0,3).join(', ')"></div>
        </template>
      </div>
    </template>

    <!-- STEP 1: 붙여넣기 영역 (데이터 없을 때) -->
    <template x-if="pasteModal.rows.length === 0">
      <div>
        <textarea
          x-ref="pasteArea"
          @paste="handlePaste($event)"
          @input="handlePasteInput($event.target.value)"
          placeholder="여기에 Excel 데이터를 붙여넣으세요 (Ctrl+V)&#10;&#10;첫 행이 컬럼명(이름, 업체명 등)이면 자동으로 인식합니다."
          rows="8"
          class="w-full font-mono text-sm"
          style="border-radius:12px;border:2px dashed #0071e3;background:#f0f5ff;resize:vertical"
        ></textarea>
        <div class="mt-2 p-3 rounded-xl text-xs text-gray-500" style="background:#f9f9fb;border:1px solid #e8e8ed">
          <div class="font-bold text-gray-600 mb-1">💡 사용법</div>
          <div>① Excel에서 데이터 범위 선택 → Ctrl+C</div>
          <div>② 위 영역 클릭 후 Ctrl+V</div>
          <div>③ 컬럼 매핑 확인 후 "가져오기" 클릭</div>
        </div>
      </div>
    </template>

    <!-- STEP 2: 미리보기 + 컬럼 매핑 -->
    <template x-if="pasteModal.rows.length > 0">
      <div>
        <!-- 헤더 토글 -->
        <div class="flex items-center gap-3 mb-3">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" x-model="pasteModal.hasHeader" @change="reParsePaste()"
                   class="accent-blue-500" style="width:16px;min-width:16px;padding:0!important">

};

function detectColMap(headers) {
  const map = {}; // colIndex → fieldName or 'vtype:태그명'
  headers.forEach((h, i) => {
    // (*) 표시, 개행, 공백 제거
    const k = h.trim().replace(/\(\*\)/g,'').replace(/\s+/g,'');
    const lower = k.toLowerCase();
    if (COL_DICT[k])       { map[i] = COL_DICT[k]; return; }
    if (COL_DICT[lower])   { map[i] = COL_DICT[lower]; return; }
    for (const [pat, vtag] of Object.entries(VTYPE_DICT)) {
      if (k.includes(pat) || lower.includes(pat.toLowerCase())) {
        map[i] = 'vtype:'+vtag; return;
      }
    }
  });
  return map;
}

function parseTSV(text) {
  return text.split(/\r?\n/).filter(r=>r.trim()).map(row => {
    const cells = []; let cur = ''; let inQ = false;
    for (let i = 0; i < row.length; i++) {
      const c = row[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === '\t' && !inQ) { cells.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cells.push(cur.trim());
    return cells;
  });
}

function rowsToWorkers(headers, rows, colMap, siteCode) {
  return rows.map(row => {
    const w = {
      site_code: siteCode, name:'', name_korean:'', company:'',
      worker_code:'', education_date:'', job_type:'', nationality:'',
      birth_date:'', phone:'', residence_status:'', residence_expiry:'',
      gender:'', last_exam_date:'',
      vulnerability_types:[], diseases:'', work_restrictions:'', notes:'',
    };
    Object.entries(colMap).forEach(([i, field]) => {
      const val = (row[parseInt(i)] || '').trim();
      if (!val || val === '-' || val === '없음' || val === 'N/A') return;
      if (field.startsWith('vtype:')) {
        const vtag = field.slice(6);
        if (/^(y|o|해당|v|1|예|yes|있음|√|✓|●)/i.test(val)) w.vulnerability_types.push(vtag);
      } else if (field === 'has_disease') {
        // '유' 이면 기타유질환 취약유형으로 추가
        if (/^유$|있음|yes/i.test(val)) {
          if (!w.vulnerability_types.includes('기타유질환')) w.vulnerability_types.push('기타유질환');
        }
      } else {
        w[field] = val;
      }
    });
    if (!w.name) w.name = w.name_korean;
    w.is_vulnerable = w.vulnerability_types.length > 0 ? 1 : 0;
    return w;
  }).filter(w => w.name || w.name_korean);
}

        localStorage.removeItem('siteName');
      }
      if (urlSite && this.siteCode) { this.siteLocked = true; this.loadLoginCompanies(); this.loginRole = 'company'; }

      // ── 세션 자동 복원 (새로고침 유지) ──
      if (this.siteCode) {
        const savedCoords = localStorage.getItem('vw_loc_coords_'+this.siteCode);
        if (savedCoords) { try { this.customCoords = JSON.parse(savedCoords); } catch {} }

        const savedAdmin = JSON.parse(localStorage.getItem('vw_admin_auth')||'null');
        if (savedAdmin && savedAdmin.site_code === this.siteCode && Date.now() - savedAdmin.ts < 3600000) {
          this.authed = true; this.role = 'admin';
          await this.loadWorkers(); await this.loadLocations();
        }
        if (!this.authed) {
          const savedCompany = JSON.parse(localStorage.getItem('vw_company_auth')||'null');
          if (savedCompany && savedCompany.site_code === this.siteCode && Date.now() - savedCompany.ts < 28800000) {
            this.authed = true; this.role = 'company'; this.company = savedCompany.company;
            await this.loadCompanyWorkers(); await this.loadLocations();
          }
        }
      }

      const params = new URLSearchParams(location.search);
      this.mode = params.get('mode') || '';
      if (this.mode === 'health') {
        this.siteCode            = params.get('site_code') || this.siteCode;
        this.company             = params.get('company') || '';
        this.healthCompanyFilter = params.get('company') || '';
        this.healthDate          = params.get('date') || '';
        this.healthSlot          = params.get('slot') || '';
        this.heatLevel           = params.get('heat_level') || '';
        this.feelsLike           = parseFloat(params.get('feels_like')) || null;
        // 저장된 세션 확인
        const saved = JSON.parse(localStorage.getItem('vw_admin_auth')||'null');
        if (saved && saved.site_code === this.siteCode && Date.now() - saved.ts < 3600000) {
          this.authed = true;
          this.role = 'admin';
          await this.loadHealthPanel();
        }
      }
    },

    _applyAutoVtypes(w) {
      // 로딩 시: 나이·신규배치자만 재계산. 질환 기반은 저장값 존중.
      const AGE_AUTO = ['고령','초고령','고령(만60세이상)','초고령(만66세이상)'];
      const today = new Date(); today.setHours(0,0,0,0);
      let vtypes = (w.vulnerability_types||[]).filter(v => !AGE_AUTO.includes(v) && v !== '신규배치자');
      if (w.birth_date) {
        const birth = new Date(w.birth_date);
        let age = today.getFullYear() - birth.getFullYear();
        const m = today.getMonth() - birth.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
        if (age >= 66) vtypes.push('초고령');
        else if (age >= 60) vtypes.push('고령');
      }
      if (w.education_date) {
        const edu = new Date(w.education_date); edu.setHours(0,0,0,0);
        const diffDays = Math.floor((today - edu) / 86400000);
        if (diffDays >= 0 && diffDays <= 14) vtypes.push('신규배치자');
      }
      return { ...w, vulnerability_types: vtypes, is_vulnerable: vtypes.length > 0 ? 1 : 0 };
    },

    copyVulnList() {
      const today = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});
      const vuln = this.workers.filter(w => w.is_vulnerable && w.deploy_status !== 'inactive');
      let text = `🔴 취약근로자 현황\n`;
      text += `📅 ${today}  현장: ${this.siteCode}\n`;
      text += `${'─'.repeat(28)}\n`;
      text += `총 ${vuln.length}명\n\n`;
      vuln.forEach((w, i) => {
        const name = w.name_korean || w.name;
        const info = [w.company, w.job_type].filter(Boolean).join(' / ');
        const vtypes = (w.vulnerability_types || []).join(', ');
        const locs = (this.workerLocations[w.id] || []).join('·') || '미배정';
        text += `${i+1}. ${name}  (${info})\n`;
        text += `   └ ${vtypes}  |  위치: ${locs}\n`;
      });
      text += `\n${'─'.repeat(28)}\n`;
      navigator.clipboard.writeText(text).then(() => this.showToast('📋 클립보드에 복사됐어요'));
    },

    async recalcVtypes() {
      const r = await fetch(API_BASE+'/api/vw/workers/recalc-vtypes?site_code='+this.siteCode, { method:'POST' });
      const d = await r.json();
      await this.loadWorkers();
      this.showToast(`취약구분 재계산 완료 (${d.updated}명)`);

    async loadLoginCompanies() {
      if (!this.siteCode) return;
      const r = await fetch(API_BASE+'/api/vw/visible-companies?site_code='+this.siteCode);
      const d = await r.json();
      this.loginCompanies = d.companies || [];

    showToast(msg) {
      this.toast = { show:true, msg };
      setTimeout(() => this.toast.show=false, 2500);

    // ── 로그인 ────────────────────────────────────────────────────────────────
    async doLogin() {
      if (!this.siteCode) { this.loginError='현장코드를 입력하세요'; return; }
      this.loginLoading = true; this.loginError = '';
      try {
        if (this.loginRole === 'admin') {
          const r = await fetch(API_BASE+'/api/pin/verify', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ site_code: this.siteCode, pin: this.loginPin })
          });
          const d = await r.json();
          if (!d.ok) { this.loginError='PIN이 올바르지 않습니다'; return; }
          this.authed = true; this.role = 'admin';
          localStorage.setItem('vw_admin_auth', JSON.stringify({ site_code: this.siteCode, ts: Date.now() }));
          await this.loadWorkers();
          await this.loadLocations();
        } else {
          if (!this.loginCompany) { this.loginError='업체명을 입력하세요'; return; }
          const r = await fetch(API_BASE+'/api/vw/company-pins/verify', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ site_code: this.siteCode, company: this.loginCompany, pin: this.loginPin })
          });
          const d = await r.json();
          if (!d.ok) { this.loginError='PIN이 올바르지 않습니다'; return; }
          this.authed = true; this.role = 'company'; this.company = this.loginCompany;
          localStorage.setItem('vw_company_auth', JSON.stringify({ site_code: this.siteCode, company: this.loginCompany, ts: Date.now() }));
          await this.loadCompanyWorkers();
          await this.loadLocations();
        }
      } catch(e) { this.loginError='오류가 발생했습니다'; }

    },

      localStorage.removeItem('vw_admin_auth');
      localStorage.removeItem('vw_company_auth');

    async companyToggleDeployStatus(company) {
      const cws = this.workers.filter(w => w.company === company);
      const allInactive = cws.length > 0 && cws.every(w => w.deploy_status === 'inactive');
      const newStatus = allInactive ? 'active' : 'inactive';
      await Promise.all(cws.map(w =>
        fetch(API_BASE+'/api/vw/workers/'+w.id+'/deploy-status', {
          method:'PUT', headers:{'Content-Type':'application/json'},

        })
      ));

      this.showToast(newStatus === 'inactive' ? company+' 전체 미투입 처리' : company+' 전체 투입 복귀');

    get filteredWorkers() {
      let ws = this.workers;
      if (this.workerFilter && this.workerGroupBy !== 'location_vuln') {
        ws = ws.filter(w => w.company === this.workerFilter);
      }
      if (this.workerShowFilter === 'vuln') {
        ws = ws.filter(w => w.is_vulnerable && w.deploy_status !== 'inactive');
      } else if (this.workerShowFilter === 'attend_vuln') {
        const ids = new Set(this.adminTodayAttendance.map(a => a.worker_id));
        ws = ws.filter(w => w.is_vulnerable && ids.has(w.id));
      }
      if (this.workerSearch.trim()) {
        const q = this.workerSearch.trim().toLowerCase();
        ws = ws.filter(w => (w.name_korean || w.name || '').toLowerCase().includes(q));
      }
      if (this.workerEduFrom || this.workerEduTo) {
        ws = ws.filter(w => {
          const edu = w.education_date || '';
          if (!edu) return false;
          if (this.workerEduFrom && edu < this.workerEduFrom) return false;
          if (this.workerEduTo   && edu > this.workerEduTo)   return false;
          return true;
        });
      }
      return ws;
    },

    get groupedWorkers() {
      const sortInactive = ws => [...ws].sort((a,b)=>{
        const ai=a.deploy_status==='inactive'?1:0, bi=b.deploy_status==='inactive'?1:0;
        return ai-bi;
      });

      // 위치별 취약 뷰
      if (this.workerGroupBy === 'location_vuln') {
        const byId = {};
        this.workers.filter(w=>w.is_vulnerable&&w.deploy_status!=='inactive')
                    .forEach(w=>{ byId[w.id]=w; });
        const locMap = {};
        this.adminTodayAttendance.forEach(a => {
          const w = byId[a.worker_id];
          if (w) {
            const locs = this.parseLocations(a.work_location);
            locs.forEach(loc => {
              if (!locMap[loc]) locMap[loc] = [];
              locMap[loc].push({ ...w, _company: a.company });
            });
          }
        });
        const unattended = this.workers.filter(w =>
          w.is_vulnerable && w.deploy_status!=='inactive' &&
          !this.adminTodayAttendance.some(a=>a.worker_id===w.id)
        );
        if (unattended.length) locMap['미출근(취약)'] = unattended;
        return Object.entries(locMap)
          .sort(([a],[b])=>a.localeCompare(b,'ko'))
          .map(([loc, ws]) => ({ company: loc, workers: ws, isLocationGroup: true }));
      }

      // 업체+직종 중첩 뷰
      if (this.workerGroupBy === 'company_jobtype') {
        const cMap = {};
        this.filteredWorkers.forEach(w => {
          const c = w.company||'미지정';
          if (!cMap[c]) cMap[c] = { all:[], byJob:{} };
          cMap[c].all.push(w);
          const j = w.job_type||'직종 미지정';
          if (!cMap[c].byJob[j]) cMap[c].byJob[j] = [];
          cMap[c].byJob[j].push(w);
        });
        const rows = Object.entries(cMap)
          .sort(([a],[b])=>a.localeCompare(b,'ko'))
          .map(([company, data]) => {
            const allInactive = data.all.length > 0 && data.all.every(w=>w.deploy_status==='inactive');
            return {
              company, workers: data.all, isNested: true, allInactive,
              subgroups: Object.entries(data.byJob)
                .sort(([a],[b])=>a.localeCompare(b,'ko'))
                .map(([jt, ws]) => ({ label: jt, workers: sortInactive(ws) }))
            };
          });
        return rows.sort((a,b)=>(a.allInactive?1:0)-(b.allInactive?1:0));
      }

      // 단순 그룹
      const key = this.workerGroupBy==='jobtype'
        ? (w=>w.job_type||'직종 미지정')
        : (w=>w.company||'미지정');
      const groups = {};
      this.filteredWorkers.forEach(w => {
        const k = key(w);
        if (!groups[k]) groups[k] = [];
        groups[k].push(w);
      });
      const rows = Object.entries(groups)
        .sort(([a],[b])=>a.localeCompare(b,'ko'))
        .map(([label, ws]) => {
          const allInactive = ws.length > 0 && ws.every(w=>w.deploy_status==='inactive');
          return { company: label, workers: sortInactive(ws), allInactive };
        });
      return rows.sort((a,b)=>(a.allInactive?1:0)-(b.allInactive?1:0));
    },

    parseDiseases(str) {
      if (!str) return [];
      return str.split(',').map(s => s.trim()).filter(Boolean);
    },

    parseLocations(locStr) {
      if (!locStr) return ['위치 미지정'];
      try {
        const arr = JSON.parse(locStr);
        return Array.isArray(arr) && arr.length > 0 ? arr : ['위치 미지정'];
      } catch { return [locStr]; }
    },

    mapWorkersAt(loc) {
      return this.mapAttendance.filter(a => this.parseLocations(a.work_location).includes(loc));
    },

    async loadMapAttendance() {
      const today = new Date().toISOString().slice(0,10);
      const date = this.role === 'company' ? this.attDate : today;
      const companyQ = this.role === 'company' ? '&company='+encodeURIComponent(this.company) : '';
      const r = await fetch(API_BASE+'/api/vw/attendance?site_code='+this.siteCode+'&work_date='+date+companyQ);
      const d = await r.json();
      this.mapAttendance = (d.attendance || []).map(a => this._applyAutoVtypes(a));
    },

    isWorkerAtLoc(wid, loc) {
      const locs = this.workerLocations[wid] || [];
      if (loc === '전구역') return locs.includes('전구역');
      return locs.includes(loc) || locs.includes('전구역');
    },

    toggleWorkerAtLoc(wid, loc) {
      const current = this.workerLocations[wid] || [];
      const next = current.includes(loc) ? current.filter(l => l !== loc) : [...current, loc];
      this.workerLocations = { ...this.workerLocations, [wid]: next };
    },

    toggleAllZone(wid) {
      const current = this.workerLocations[wid] || [];
      const next = current.includes('전구역') ? [] : ['전구역'];
      this.workerLocations = { ...this.workerLocations, [wid]: next };
    },

    countAtLoc(loc) {
      if (loc === '전구역') {
        return Object.values(this.workerLocations).filter(locs => locs.includes('전구역')).length;
      }
      // 전구역 배정된 근로자도 각 위치에 포함
      return Object.values(this.workerLocations).filter(locs => locs.includes(loc) || locs.includes('전구역')).length;
    },

    getBadgeStyle(loc) {
      if (this.dragLoc === loc) return 'background:#f59e0b';
      const custom = this.getLocColor(loc);
      const base = custom || ((this.mapWorkersAt(loc)||[]).length > 0 ? '#dc2626' : '#475569');
      if (this.mapSelectedLoc === loc) return `background:${base};box-shadow:0 0 0 3px white,0 0 0 5px ${base}`;
      return `background:${base}`;
    },
    getBadgeStyleCompany(loc) {
      if (this.selectedLocTab === loc) return 'background:#2563eb';
      if (this.countAtLoc(loc) > 0) return 'background:#16a34a';
      return 'background:#6b7280';
    },
    MARKER_COLORS: ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#475569'],

    getLocColor(loc) {
      const l = this.locations.find(l => l.location_name === loc);
      return l?.marker_color || '';
    },

    async setMarkerColor(loc, color) {
      const l = this.locations.find(l => l.location_name === loc);
      if (!l) return;
      const newColor = l.marker_color === color ? '' : color;
      await fetch(API_BASE+'/api/vw/locations/'+l.id, {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({color: newColor})
      });
      l.marker_color = newColor;
    },

    startEditMarkerName(loc) {
      this.editingMarkerKey = loc;
      this.editingMarkerNewName = loc;
    },
    async saveMarkerName(oldName) {
      const newName = this.editingMarkerNewName.trim();
      this.editingMarkerKey = null;
      if (!newName || newName === oldName) return;
      const loc = this.locations.find(l => l.location_name === oldName);
      if (!loc) return;
      await fetch(API_BASE+'/api/vw/locations/'+loc.id, {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name: newName})
      });
      if (this.customCoords[oldName]) {
        const coord = this.customCoords[oldName];
        const nc = {...this.customCoords};
        delete nc[oldName];
        nc[newName] = coord;
        this.customCoords = nc;
        localStorage.setItem('vw_loc_coords_'+this.siteCode, JSON.stringify(this.customCoords));
      }
      await this.loadLocations();
      this.showToast('마커 이름 변경: '+oldName+' → '+newName);
    },
    async deleteLocationByName(name) {
      if (!confirm(`'${name}' 마커를 삭제할까요?`)) return;
      const loc = this.locations.find(l => l.location_name === name);
      if (!loc) return;
      await fetch(API_BASE+'/api/vw/locations/'+loc.id, {method:'DELETE'});
      const nc = {...this.customCoords};
      delete nc[name];
      this.customCoords = nc;
      localStorage.setItem('vw_loc_coords_'+this.siteCode, JSON.stringify(this.customCoords));
      await this.loadLocations();
    },
    placeNewMarker(e) {
      if (!this.newLocationName.trim()) { this.showToast('이름을 먼저 입력하세요'); return; }
      const rect = this.$refs.adminMapEl.getBoundingClientRect();
      const x = parseFloat(((e.clientX-rect.left)/rect.width*100).toFixed(1));
      const y = parseFloat(((e.clientY-rect.top)/rect.height*100).toFixed(1));
      this.addLocationAtPoint(x, y);
    },
    async addLocationAtPoint(x, y) {
      const name = this.newLocationName.trim();
      if (!name) return;
      await fetch(API_BASE+'/api/vw/locations', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({site_code: this.siteCode, name})
      });
      this.customCoords = {...this.customCoords, [name]: {x, y}};
      localStorage.setItem('vw_loc_coords_'+this.siteCode, JSON.stringify(this.customCoords));
      this.newLocationName = '';
      this.locAddMode = false;
      await this.loadLocations();
      this.showToast(name+' 마커 추가');
    },
    async seedDefaultLocations() {
      for (const name of this.DEFAULT_LOCATION_NAMES) {
        await fetch(API_BASE+'/api/vw/locations', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({site_code: this.siteCode, name})
        });
      }
      await this.loadLocations();
      this.showToast('기본 마커 불러오기 완료');
    },

    toggleCollapseCompany(company) {
      this.collapsedCompanies = {...this.collapsedCompanies, [company]: !this.collapsedCompanies[company]};
    },
    toggleCollapseJobType(key) {
      this.collapsedJobTypes = {...this.collapsedJobTypes, [key]: !this.collapsedJobTypes[key]};
    },

    getCoord(loc) {
      return this.customCoords[loc] || this.LOCATION_COORDS[loc] || {x:50, y:50};
    },
    startLocDrag(e, loc) {
      e.preventDefault();
      this.dragLoc = loc;
    },
    startLocDragTouch(e, loc) {
      e.preventDefault();
      this.dragLoc = loc;
    },
    onMapMouseMove(e) {
      if (!this.locEditMode || !this.dragLoc) return;
      const rect = this.$refs.adminMapEl.getBoundingClientRect();
      const x = Math.max(1, Math.min(99, parseFloat(((e.clientX-rect.left)/rect.width*100).toFixed(1))));
      const y = Math.max(1, Math.min(99, parseFloat(((e.clientY-rect.top)/rect.height*100).toFixed(1))));
      this.customCoords = {...this.customCoords, [this.dragLoc]: {x, y}};
    },
    onMapTouchMove(e) {
      if (!this.locEditMode || !this.dragLoc || !e.touches[0]) return;
      e.preventDefault();
      const rect = this.$refs.adminMapEl.getBoundingClientRect();
      const t = e.touches[0];
      const x = Math.max(1, Math.min(99, parseFloat(((t.clientX-rect.left)/rect.width*100).toFixed(1))));
      const y = Math.max(1, Math.min(99, parseFloat(((t.clientY-rect.top)/rect.height*100).toFixed(1))));
      this.customCoords = {...this.customCoords, [this.dragLoc]: {x, y}};
    },
    endLocDrag() {
      if (!this.dragLoc) return;
      this.dragLoc = null;
      localStorage.setItem('vw_loc_coords_'+this.siteCode, JSON.stringify(this.customCoords));
    },
    resetLocCoords() {
      this.customCoords = {};
      localStorage.removeItem('vw_loc_coords_'+this.siteCode);
      this.showToast('기본 위치로 초기화');
    },

    get totalAttended() {
      return Object.values(this.workerLocations).filter(locs => locs.length > 0).length;
    },

    isElderlyVuln(w) {
      const vt = w.vulnerability_types || [];
      return vt.includes('고령') || vt.includes('초고령');
    },
    isNewWorker(w) {
      return (w.vulnerability_types || []).includes('신규배치자');
    },
    hasOtherVuln(w) {
      const vt = w.vulnerability_types || [];
      return vt.some(v => v !== '고령' && v !== '초고령' && v !== '신규배치자');
    },

    vtypeColor(vt) {
      const map = {
        '고령':          'background:#ff9500',
        '초고령':         'background:#ff6c00',
        '혈압':          'background:#ff3b30',
        '심뇌혈관질환':    'background:#ff2d55',
        '당뇨':          'background:#af52de',
        '기타유질환':     'background:#636366',
        '신규배치자':     'background:#007aff',
        '특정약물복용자':  'background:#5856d6',
        '온열질환병력':    'background:#ff6b00',
        '신장질환':       'background:#00c7be',
        '비만':          'background:#ff375f',
      };
      return (map[vt] || 'background:#ff3b30') + ';color:white';
    },

    filteredDiseases(w) {
      const vtypes = w.vulnerability_types || [];
      return this.parseDiseases(w.diseases).filter(d => {
        if (vtypes.includes('혈압') && d.includes('혈압')) return false;
        if (vtypes.includes('당뇨') && d.includes('당뇨')) return false;
        if (vtypes.includes('심뇌혈관질환') && (d.includes('심장') || d.includes('뇌혈관') || d.includes('심뇌혈관'))) return false;
        return true;
      });
    },

    autoFillVtypes() {
      const AGE_AUTO = ['고령','초고령','고령(만60세이상)','초고령(만66세이상)'];
      const today = new Date(); today.setHours(0,0,0,0);
      // 나이·신규배치자만 재계산, 질환 기반은 현재 체크 상태 유지하되 미기입 시 자동 제안
      let vtypes = this.workerModal.data.vulnerability_types.filter(v => !AGE_AUTO.includes(v) && v !== '신규배치자');

      // 나이 기반
      const bd = this.workerModal.data.birth_date;
      if (bd) {
        const birth = new Date(bd);
        let age = today.getFullYear() - birth.getFullYear();
        const m = today.getMonth() - birth.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
        if (age >= 66) vtypes.push('초고령');
        else if (age >= 60) vtypes.push('고령');
      }

      // 신규배치자 (투입일 기준 14일 이내)
      const edu = this.workerModal.data.education_date;
      if (edu) {
        const eduDate = new Date(edu); eduDate.setHours(0,0,0,0);
        const diffDays = Math.floor((today - eduDate) / 86400000);
        if (diffDays >= 0 && diffDays <= 14) vtypes.push('신규배치자');
      }

      // 기저질환 기반 (체크 안 된 경우만 자동 제안)
      const d = this.workerModal.data.diseases || '';
      if (d.includes('혈압') && !vtypes.includes('혈압')) vtypes.push('혈압');
      if (d.includes('당뇨') && !vtypes.includes('당뇨')) vtypes.push('당뇨');
      if ((d.includes('심장')||d.includes('뇌혈관')||d.includes('심뇌혈관')) && !vtypes.includes('심뇌혈관질환')) vtypes.push('심뇌혈관질환');

      this.workerModal.data = { ...this.workerModal.data, vulnerability_types: vtypes };
    },

    // ── 업체: 이전 날짜 출근 불러오기 ─────────────────────────────────────────
    async loadPreviousAttendance(daysAgo) {
      const d = new Date(this.attDate);
      d.setDate(d.getDate() - daysAgo);
      const prevDate = d.toISOString().slice(0,10);
      const r = await fetch(API_BASE+'/api/vw/attendance?site_code='+this.siteCode+'&company='+encodeURIComponent(this.company)+'&work_date='+prevDate);
      const data = await r.json();
      if (!(data.attendance||[]).length) { this.showToast(daysAgo+'일 전 출근기록이 없습니다'); return; }
      const activeIds = new Set(this.companyWorkers.filter(w=>(w.deploy_status||'active')==='active').map(w=>w.id));
      const wl = {};
      for (const a of (data.attendance||[])) {
        if (!activeIds.has(a.worker_id)) continue;
        try {
          const locs = JSON.parse(a.work_location);
          if (Array.isArray(locs) && locs.length > 0) wl[a.worker_id] = locs;
          else if (a.work_location) wl[a.worker_id] = [a.work_location];
        } catch { if (a.work_location) wl[a.worker_id] = [a.work_location]; }
      }
      this.workerLocations = { ...wl };
      this.showToast(daysAgo+'일 전 출근 명단 불러옴 ('+Object.keys(wl).length+'명)');
    },

    // ── 업체: 출근체크 ────────────────────────────────────────────────────────
    async loadCompanyWorkers() {
      const r = await fetch(API_BASE+'/api/vw/workers?site_code='+this.siteCode+'&company='+encodeURIComponent(this.company));
      const d = await r.json();
      this.companyWorkers = (d.workers || []).map(w => this._applyAutoVtypes(w));
      const r2 = await fetch(API_BASE+'/api/vw/attendance?site_code='+this.siteCode+'&company='+encodeURIComponent(this.company)+'&work_date='+this.attDate);
      const d2 = await r2.json();
      const wl = {};
      for (const a of (d2.attendance || [])) {
        try {
          const locs = JSON.parse(a.work_location);
          if (Array.isArray(locs) && locs.length > 0) wl[a.worker_id] = locs;
          else if (a.work_location) wl[a.worker_id] = [a.work_location];
        } catch { if (a.work_location) wl[a.worker_id] = [a.work_location]; }
      }
      this.workerLocations = wl;
      await this.loadLocations();
    },
