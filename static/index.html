<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>체감온도 기록관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nanum+Square:wght@400;700;800&display=swap">
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  [x-cloak]{display:none!important}
  body{font-family:'Nanum Square','Apple SD Gothic Neo','맑은 고딕',sans-serif;background:#f5f5f7}
  .card{background:white;border-radius:14px;padding:16px 18px;box-shadow:0 1px 8px rgba(0,0,0,.07);border:1px solid #e8e8ed}
  .kpi-card{background:white;border:1px solid #e8e8ed;border-radius:13px;padding:12px;text-align:center}
  .kpi-val{font-size:1.4rem;font-weight:800;color:#1c1c1e}
  .kpi-lbl{font-size:.68rem;color:#86868b;margin-top:2px}
  .btn-primary{background:#0071e3;color:white;border-radius:10px;padding:9px 16px;font-weight:700;font-size:.85rem;cursor:pointer;transition:background .15s;border:none}
  .btn-primary:hover{background:#005bbf}
  .btn-primary:disabled{background:#b0b0b5;cursor:not-allowed}
  .btn-secondary{background:#f2f2f7;color:#1c1c1e;border-radius:10px;padding:9px 14px;font-weight:700;font-size:.85rem;cursor:pointer;transition:background .15s;border:none}
  .btn-secondary:hover{background:#e5e5ea}
  input,select,textarea{border:1px solid #d1d5db;border-radius:8px;padding:7px 10px;font-size:.85rem;width:100%;outline:none;transition:border-color .15s;font-family:inherit}
  input:focus,select:focus,textarea:focus{border-color:#0071e3;box-shadow:0 0 0 3px rgba(0,113,227,.12)}
  .tab-btn{transition:all .2s;border-radius:9px;padding:8px 10px;font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap;border:none;background:transparent}
  .tab-btn.active{background:white;box-shadow:0 1px 6px rgba(0,0,0,.12);color:#0071e3}
  .tab-btn:not(.active){color:#86868b}
  .tab-btn:not(.active):hover{background:rgba(255,255,255,.6)}
  .drop-zone{border:2px dashed #c7c7cc;border-radius:13px;padding:28px 16px;text-align:center;background:#fafafa;cursor:pointer;transition:all .2s}
  .drop-zone:hover,.drop-zone.dragover{border-color:#0071e3;background:#f0f5ff}
  .badge-위험{background:#ff3b30;color:white;padding:2px 7px;border-radius:5px;font-size:.72rem;font-weight:800}
  .badge-경고{background:#ff9500;color:white;padding:2px 7px;border-radius:5px;font-size:.72rem;font-weight:800}
  .badge-주의{background:#ffcc00;color:#1c1c1e;padding:2px 7px;border-radius:5px;font-size:.72rem;font-weight:800}
  .badge-관심{background:#34c759;color:white;padding:2px 7px;border-radius:5px;font-size:.72rem;font-weight:800}
  .week-tag{display:inline-block;background:#0071e3;color:white;border-radius:8px;padding:3px 12px;font-size:.8rem;font-weight:700}
  .grid-table{width:100%;border-collapse:collapse;font-size:.8rem}
  .grid-table th{background:#0071e3;color:white;padding:7px 6px;text-align:center;font-weight:700;white-space:nowrap}
  .grid-table td{padding:4px 5px;border:1px solid #e8e8ed;vertical-align:middle}
  .grid-table tr:nth-child(even){background:#f9f9fb}
  .grid-table tr:hover{background:#f0f5ff}
  .grid-table input,.grid-table select{border:none;background:transparent;padding:4px 5px;font-size:.8rem;width:100%;border-radius:4px;font-family:inherit}
  .grid-table input:focus,.grid-table select:focus{background:white;border:1px solid #0071e3;box-shadow:0 0 0 2px rgba(0,113,227,.1)}
  .photo-thumb{width:72px;height:72px;object-fit:cover;border-radius:8px;border:2px solid #e8e8ed}
  .progress-bar{height:4px;background:#e8e8ed;border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:#0071e3;transition:width .3s}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:#f1f1f1}
  ::-webkit-scrollbar-thumb{background:#c7c7cc;border-radius:3px}
</style>
</head>

<body x-data="app()" x-init="init()" x-cloak>

<!-- ── 고정 상단 헤더 ──────────────────────────────────────────────────────── -->
<header class="sticky top-0 z-40 bg-white/95 backdrop-blur-sm border-b border-gray-100 shadow-sm">
  <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
    <h1 class="text-base font-extrabold text-gray-900 tracking-tight">🌡 체감온도 기록관리</h1>
    <div class="flex items-center gap-2">
      <template x-if="meta.siteCode">
        <span class="text-xs px-2 py-1 bg-blue-50 text-blue-700 rounded-lg font-bold border border-blue-100"
              x-text="meta.siteCode"></span>
      </template>
      <template x-if="meta.location">
        <span class="text-xs text-gray-400 hidden sm:inline truncate max-w-24" x-text="meta.location"></span>
      </template>
      <span class="text-xs font-semibold"
            :class="apiOk ? 'text-green-600' : 'text-red-500'"
            :title="apiOk ? 'Gemini AI 연결됨' : 'API 키 미설정'"
            x-text="apiOk ? '✅ AI' : '❌ AI'"></span>
    </div>
  </div>
</header>

<div class="max-w-3xl mx-auto p-3 space-y-3 pb-10">

  <!-- ══ 현장 기본 정보 ═══════════════════════════════════════════════════ -->
  <div class="card">
    <div class="text-xs font-extrabold text-blue-600 mb-3">🏗 현장 기본 정보</div>
    <div class="grid grid-cols-2 gap-2 mb-2">
      <div>
        <label class="text-xs text-gray-500 font-bold">현장코드</label>
        <input type="text" x-model="meta.siteCode" placeholder="예: J881"
               @change="onSiteCodeChange" list="site-code-list" class="mt-1">
        <datalist id="site-code-list">
          <template x-for="s in ac.siteCodes" :key="s.code">
            <option :value="s.code" :label="s.name"></option>
          </template>
        </datalist>
      </div>
      <div>
        <label class="text-xs text-gray-500 font-bold">현장명</label>
        <input type="text" x-model="meta.siteName" placeholder="현장명" list="site-name-list" class="mt-1">
        <datalist id="site-name-list">
          <template x-for="s in ac.siteCodes" :key="s.name">
            <option :value="s.name"></option>
          </template>
        </datalist>
      </div>
      <div>
        <label class="text-xs text-gray-500 font-bold">업체명</label>
        <input type="text" x-model="meta.company" placeholder="업체명" list="company-list" class="mt-1">
        <datalist id="company-list">
          <template x-for="c in ac.companies" :key="c">
            <option :value="c"></option>
          </template>
        </datalist>
      </div>
      <div>
        <label class="text-xs text-gray-500 font-bold">온습도계 위치</label>
        <input type="text" x-model="meta.location" placeholder="예: GATE 2" list="loc-list" class="mt-1">
        <datalist id="loc-list">
          <template x-for="l in ac.locations" :key="l">
            <option :value="l"></option>
          </template>
        </datalist>
      </div>
    </div>
    <div>
      <label class="text-xs text-gray-500 font-bold">측정자</label>
      <input type="text" x-model="meta.measurer" placeholder="홍길동" @change="saveMeasurer" class="mt-1">
    </div>
  </div>

  <!-- ══ 사진 등록 탭 ══════════════════════════════════════════════════════ -->
  <div class="card">
    <!-- 탭 버튼: 글자 잘리지 않도록 white-space:nowrap 적용 -->
    <div class="flex gap-1 bg-gray-100 p-1 rounded-xl mb-4">
      <button class="tab-btn flex-1" :class="{active:activeTab==='camera'}"  @click="activeTab='camera'">📸 촬영</button>
      <button class="tab-btn flex-1" :class="{active:activeTab==='upload'}"  @click="activeTab='upload'">📁 업로드</button>
      <button class="tab-btn flex-1" :class="{active:activeTab==='history'}" @click="activeTab='history'">📋 기간 조회</button>
    </div>

    <!-- ── 카메라 탭 ── -->
    <div x-show="activeTab==='camera'">
      <p class="text-xs text-gray-400 mb-3">측정 구분(오전1~오후2)은 AI 시간 인식 결과로 자동 판정됩니다.</p>
      <div class="mb-3">
        <label class="text-xs text-gray-500 font-bold">촬영 날짜</label>
        <input type="date" x-model="cam.date" class="mt-1">
      </div>
      <label class="drop-zone block cursor-pointer" for="cam-input">
        <div class="text-3xl mb-2">📷</div>
        <div class="font-bold text-gray-700 text-sm">여기를 탭하여 카메라 열기</div>
        <div class="text-xs text-gray-400 mt-1">모바일: 후면 카메라 / PC: 웹캠 또는 파일 선택</div>
      </label>
      <input id="cam-input" type="file" accept="image/*" capture="environment"
             class="hidden" @change="onCameraCapture">
      <template x-if="cam.preview">
        <div class="mt-3 flex gap-3 items-start bg-blue-50 rounded-xl p-3">
          <img :src="cam.preview" class="w-28 h-28 object-cover rounded-xl border-2 border-blue-200 flex-shrink-0">
          <div class="flex-1">
            <div class="text-sm font-bold text-gray-800 mb-1">촬영된 사진</div>
            <div class="text-xs text-gray-500 space-y-1">
              <div>📅 <span x-text="cam.date"></span></div>
              <div>👤 <span x-text="meta.measurer||'(측정자 미입력)'"></span></div>
              <div class="text-blue-600 font-semibold">🕐 구분: AI 추출 후 자동 판정</div>
            </div>
            <button @click="addCameraPhoto" class="btn-primary mt-3 text-sm w-full">
              ✅ 사진 추가
            </button>
          </div>
        </div>
      </template>
    </div>

    <!-- ── 업로드 탭 ── -->
    <div x-show="activeTab==='upload'">
      <p class="text-xs text-gray-400 mb-3">
        파일명에 날짜가 포함되면 자동 인식됩니다.
        <code class="bg-gray-100 px-1 rounded">20260506 (1).jpg</code> → 5/6일.
        측정 구분은 AI 시간 인식으로 자동 판정.
      </p>
      <label class="drop-zone block cursor-pointer"
             @dragover.prevent="$event.currentTarget.classList.add('dragover')"
             @dragleave="$event.currentTarget.classList.remove('dragover')"
             @drop.prevent="onDrop($event)">
        <input type="file" accept="image/*" multiple class="hidden"
               @change="onFileSelect($event.target.files)">
        <div class="text-3xl mb-2">📁</div>
        <div class="font-bold text-gray-700 text-sm">클릭하거나 파일을 여기에 드래그</div>
        <div class="text-xs text-gray-400 mt-1">여러 장 동시 선택 가능 (JPG, PNG, BMP)</div>
      </label>
    </div>

    <!-- ── 기간 조회·추가 탭 ── -->
    <div x-show="activeTab==='history'">
      <p class="text-xs text-gray-400 mb-3">저장된 이전 기간의 기록을 불러오거나 사진을 추가 등록합니다.</p>
      <div class="flex gap-2 mb-3">
        <select x-model="hist.selectedWeek" class="flex-1" @change="loadHistoryWeekInfo">
          <option value="">-- 기간 선택 --</option>
          <template x-for="w in hist.availableWeeks" :key="w">
            <option :value="w" x-text="formatMonday(w)"></option>
          </template>
        </select>
        <button @click="loadHistoryWeek" class="btn-primary whitespace-nowrap">📂 불러오기</button>
      </div>
      <template x-if="hist.summary">
        <div class="grid grid-cols-3 gap-2 mb-3">
          <div class="kpi-card"><div class="kpi-val text-blue-600" x-text="hist.summary.count+'건'"></div><div class="kpi-lbl">기록 건수</div></div>
          <div class="kpi-card"><div class="kpi-val" x-text="hist.summary.maxTemp"></div><div class="kpi-lbl">최고 온도</div></div>
          <div class="kpi-card"><div class="kpi-val text-orange-500" x-text="hist.summary.maxFeels"></div><div class="kpi-lbl">최고 체감온도</div></div>
        </div>
      </template>
      <template x-if="hist.selectedWeek">
        <div>
          <div class="text-xs font-bold text-gray-600 mb-2">➕ 이 기간에 사진 추가</div>
          <label class="drop-zone block cursor-pointer">
            <input type="file" accept="image/*" multiple class="hidden"
                   @change="onHistFileSelect($event.target.files)">
            <div class="text-2xl mb-1">📎</div>
            <div class="text-sm text-gray-600">추가 사진 선택</div>
          </label>
        </div>
      </template>
    </div>
  </div>

  <!-- ══ 업로드 대기 사진 목록 ══════════════════════════════════════════════ -->
  <template x-if="queue.length > 0">
    <div class="card">
      <div class="flex items-center justify-between mb-3">
        <div class="font-bold text-gray-800 text-sm">
          📸 업로드된 사진
          <span class="text-xs text-gray-400 ml-1 font-normal" x-text="`(${queue.length}장)`"></span>
        </div>
        <div class="flex gap-2">
          <button @click="extractAll" class="btn-primary text-xs py-2 px-3"
                  :disabled="isExtracting || !apiOk"
                  x-text="isExtracting ? '추출 중...' : '🤖 AI 자동 추출'">
          </button>
          <button @click="clearQueue" class="btn-secondary text-xs py-2 px-3">🗑 초기화</button>
        </div>
      </div>
      <template x-if="isExtracting">
        <div class="mb-3">
          <div class="progress-bar mb-1">
            <div class="progress-fill" :style="`width:${extractProgress}%`"></div>
          </div>
          <div class="text-xs text-gray-400" x-text="extractStatus"></div>
        </div>
      </template>
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
        <template x-for="(item,i) in queue" :key="item.id">
          <div class="relative border border-gray-100 rounded-xl p-2 text-center">
            <img :src="item.preview" class="w-full h-24 object-cover rounded-lg mb-1">
            <div class="text-xs text-gray-400 truncate" x-text="item.filename"></div>
            <div class="text-xs font-bold text-gray-700" x-text="item.date"></div>
            <div x-show="item.status==='done'" class="mt-1">
              <span class="text-xs text-green-600 font-bold">✅ 추출완료</span>
              <div class="text-xs text-blue-600 font-bold" x-text="item.slot"></div>
              <div class="text-xs text-gray-600" x-text="(item.result?.temperature??'?')+'°C / '+(item.result?.humidity??'?')+'%'"></div>
            </div>
            <div x-show="item.status==='error'" class="mt-1">
              <span class="text-xs text-red-500 font-bold">❌ 실패</span>
            </div>
            <div x-show="item.status==='pending'" class="mt-1">
              <span class="text-xs text-gray-400">대기중</span>
            </div>
            <div x-show="item.status==='uploading'" class="mt-1">
              <span class="text-xs text-blue-500 font-bold">업로드중...</span>
            </div>
            <button @click="removeFromQueue(i)"
                    class="absolute top-1 right-1 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center">✕</button>
          </div>
        </template>
      </div>
      <div class="mt-3">
        <button @click="saveQueueToRecords"
                class="btn-primary text-sm w-full"
                :disabled="!queue.some(q=>q.status==='done')">
          💾 기록에 저장
        </button>
      </div>
    </div>
  </template>

  <!-- ══ KPI 요약 ══════════════════════════════════════════════════════════ -->
  <template x-if="records.length > 0">
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
      <div class="kpi-card" style="background:linear-gradient(135deg,#e8f4fd,#dbeafe);border-color:#bfdbfe">
        <div class="kpi-val" style="color:#1e40af" x-text="records.length+'건'"></div>
        <div class="kpi-lbl">측정 건수</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" x-text="kpi.maxTemp"></div>
        <div class="kpi-lbl">최고 온도</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" x-text="kpi.maxHumid"></div>
        <div class="kpi-lbl">최고 습도</div>
      </div>
      <div class="kpi-card" style="background:linear-gradient(135deg,#FFAB76,#FF7043);border:none">
        <div class="kpi-val" style="color:white" x-text="kpi.maxFeels"></div>
        <div class="kpi-lbl" style="color:rgba(255,255,255,.85)">최고 체감온도</div>
      </div>
    </div>
  </template>

  <!-- ══ 주별 섹션 ═════════════════════════════════════════════════════════ -->
  <template x-for="(wkInfo, wi) in weekGroups" :key="wkInfo.monday">
    <div>
      <div class="flex items-center justify-between mb-2">
        <span class="week-tag" x-text="'📅 '+wkInfo.label"></span>
        <button @click="downloadExcel(wkInfo.monday)"
                class="btn-primary text-xs py-2 px-3"
                :disabled="!wkInfo.records.some(r=>r.temperature!=null)">
          💾 엑셀 다운로드
        </button>
      </div>
      <template x-if="wkInfo.records.some(r=>r.feels_like!=null)">
        <div class="card mb-2" style="padding:10px">
          <canvas :id="'chart-'+wi" height="110"></canvas>
        </div>
      </template>
      <div class="card overflow-x-auto">
        <table class="grid-table">
          <thead>
            <tr>
              <th style="width:78px">날짜</th>
              <th style="width:55px">구분</th>
              <th style="width:72px">측정시각</th>
              <th style="width:70px">온도(°C)</th>
              <th style="width:65px">습도(%)</th>
              <th style="width:82px">체감온도(°C)</th>
              <th style="width:55px">단계</th>
              <th style="width:140px">조치사항</th>
              <th style="width:105px">기타내용</th>
              <th style="width:72px">측정자</th>
              <th style="width:95px">비고</th>
              <th style="width:36px">삭제</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="row in wkInfo.gridRows" :key="row.key">
              <tr>
                <td class="text-center text-xs font-bold" x-text="row.dateLabel"></td>
                <td class="text-center text-xs" x-text="row.slot"></td>
                <td><input type="text" x-model="row.measure_time" placeholder="HH:MM"
                           @change="autoSaveRow(row, wkInfo.monday)"></td>
                <td><input type="number" x-model.number="row.temperature" step="0.1"
                           placeholder="-" @input="recalcRow(row)"
                           @change="autoSaveRow(row, wkInfo.monday)"></td>
                <td><input type="number" x-model.number="row.humidity" step="1"
                           placeholder="-" @input="recalcRow(row)"
                           @change="autoSaveRow(row, wkInfo.monday)"></td>
                <td class="text-center">
                  <span class="font-bold text-sm"
                        x-text="row.feels_like != null ? row.feels_like.toFixed(1)+'°C' : '-'"></span>
                </td>
                <td class="text-center">
                  <span x-show="row.heat_level && row.heat_level!=='-'"
                        :class="'badge-'+row.heat_level" x-text="row.heat_level"></span>
                  <span x-show="!row.heat_level || row.heat_level==='-'" class="text-gray-300">-</span>
                </td>
                <td>
                  <select x-model="row.action" @change="autoSaveRow(row, wkInfo.monday)">
                    <option>N/A</option>
                    <option>추가휴식시간부여</option>
                    <option>보냉장구지급</option>
                    <option>작업시간대조정</option>
                    <option>작업중지</option>
                    <option>기타</option>
                  </select>
                </td>
                <td><input type="text" x-model="row.other_content"
                           :placeholder="row.action==='기타'?'내용 입력':''"
                           :disabled="row.action!=='기타'"
                           @change="autoSaveRow(row, wkInfo.monday)"></td>
                <td><input type="text" x-model="row.measurer"
                           @change="autoSaveRow(row, wkInfo.monday)"></td>
                <td><input type="text" x-model="row.notes"
                           @change="autoSaveRow(row, wkInfo.monday)"></td>
                <td class="text-center">
                  <template x-if="row.id">
                    <button @click="deleteRow(row, wkInfo)"
                            class="w-6 h-6 bg-red-100 hover:bg-red-200 text-red-500 rounded text-xs">✕</button>
                  </template>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
      <template x-if="wkInfo.photos.length > 0">
        <details class="mt-2 card">
          <summary class="cursor-pointer text-sm font-bold text-gray-700">
            📷 사진 미리보기 (<span x-text="wkInfo.photos.length"></span>장)
          </summary>
          <div class="flex flex-wrap gap-3 mt-3">
            <template x-for="ph in wkInfo.photos" :key="ph.photo_id">
              <div class="text-center">
                <img :src="'/uploads/'+ph.photo_id" class="photo-thumb">
                <div class="text-xs text-gray-400 mt-1" x-text="ph.dateLabel+' '+ph.slot"></div>
                <template x-if="ph.temperature">
                  <div class="text-xs font-bold" x-text="ph.temperature+'°C / '+ph.humidity+'%'"></div>
                </template>
              </div>
            </template>
          </div>
        </details>
      </template>
    </div>
  </template>

  <!-- 기록 없을 때 -->
  <template x-if="records.length === 0 && queue.length === 0">
    <div class="card text-center py-10 text-gray-400">
      <div class="text-5xl mb-3">🌡</div>
      <div class="font-bold text-sm">위 탭에서 사진을 등록하거나 아래에서 기록을 불러오세요</div>
    </div>
  </template>

  <!-- ══ 측정기간 선택 및 기록 불러오기 (맨 아래) ══════════════════════════ -->
  <div class="card">
    <div class="text-xs font-extrabold text-blue-600 mb-3">📅 측정기간 선택 및 기록 불러오기</div>
    <div class="grid grid-cols-2 gap-2 mb-2">
      <div>
        <label class="text-xs text-gray-500 font-bold">연도</label>
        <select x-model.number="meta.year" @change="buildWeeks" class="mt-1">
          <template x-for="y in [2024,2025,2026,2027,2028,2029]" :key="y">
            <option :value="y" x-text="y+'년'"></option>
          </template>
        </select>
      </div>
      <div>
        <label class="text-xs text-gray-500 font-bold">월</label>
        <select x-model.number="meta.month" @change="buildWeeks" class="mt-1">
          <template x-for="m in Array.from({length:12},(_,i)=>i+1)" :key="m">
            <option :value="m" x-text="m+'월'"></option>
          </template>
        </select>
      </div>
    </div>
    <div class="mb-3">
      <label class="text-xs text-gray-500 font-bold">주차</label>
      <select x-model="meta.weekLabel" @change="onWeekChange" class="mt-1">
        <template x-for="w in weeks" :key="w.monday">
          <option :value="w.label" x-text="w.label"></option>
        </template>
      </select>
    </div>
    <button @click="loadRecords" class="btn-primary w-full text-sm">
      📂 기록 불러오기
    </button>
  </div>

  <!-- ══ KOSHA 범례 ════════════════════════════════════════════════════════ -->
  <div class="card">
    <div class="text-xs font-extrabold text-gray-600 mb-2">📊 KOSHA 폭염 단계 기준</div>
    <div class="grid grid-cols-2 gap-y-1 gap-x-4 text-xs">
      <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-green-500 flex-shrink-0"></span><b>관심</b><span class="text-gray-400">체감 31~33°C</span></div>
      <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-yellow-400 flex-shrink-0"></span><b>주의</b><span class="text-gray-400">체감 33~35°C</span></div>
      <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-orange-500 flex-shrink-0"></span><b>경고</b><span class="text-gray-400">체감 35~38°C</span></div>
      <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-red-500 flex-shrink-0"></span><b>위험</b><span class="text-gray-400">체감 38°C 이상</span></div>
    </div>
  </div>

</div>

<!-- 토스트 메시지 -->
<div x-show="toast.show" x-transition
     class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-5 py-3 rounded-xl text-sm font-bold shadow-xl z-50"
     x-text="toast.msg"></div>

<!-- ══ Alpine.js 앱 로직 ══════════════════════════════════════════════════ -->
<script>
const DAYS_KO = ["월","화","수","목","금","토","일"];
const SLOTS   = ["오전1","오전2","오후1","오후2"];

// File 객체는 Alpine 반응형 상태 밖에 보관 (Proxy 문제 방지)
let _camFile = null;

function app() {
  return {
    meta: {
      siteCode:'', siteName:'', company:'', location:'',
      measurer: localStorage.getItem('measurer')||'',
      year: new Date().getFullYear(),
      month: new Date().getMonth()+1,
      weekLabel:'',
    },
    weeks: [],
    currentMonday: '',

    ac: { siteCodes:[], companies:[], locations:[] },

    activeTab: 'upload',

    // 카메라 (slot은 AI 추출 후 자동 판정되므로 UI에서 제거)
    cam: { date: todayStr(), preview:null },

    queue: [],
    isExtracting: false,
    extractProgress: 0,
    extractStatus: '',

    records: [],

    hist: {
      availableWeeks: [],
      selectedWeek: '',
      summary: null,
    },

    kpi: { maxTemp:'-', maxHumid:'-', maxFeels:'-' },
    weekGroups: [],
    apiOk: false,
    toast: { show:false, msg:'' },

    // ── 초기화 ──────────────────────────────────────────────────────────
    async init() {
      this.buildWeeks();
      await this.loadAutoComplete();
      await this.checkApi();
      await this.loadAvailableWeeks();
    },

    saveMeasurer() {
      localStorage.setItem('measurer', this.meta.measurer);
    },

    async checkApi() {
      try {
        const r = await fetch('/api/autocomplete');
        this.apiOk = r.ok;
      } catch { this.apiOk = false; }
    },

    async loadAutoComplete() {
      try {
        const r = await fetch('/api/autocomplete');
        if (r.ok) this.ac = await r.json();
      } catch {}
    },

    onSiteCodeChange() {
      const found = this.ac.siteCodes.find(s => s.code === this.meta.siteCode);
      if (found && !this.meta.siteName) this.meta.siteName = found.name;
    },

    // ── 주차 계산 ──────────────────────────────────────────────────────
    buildWeeks() {
      const y = this.meta.year, m = this.meta.month;
      const first = new Date(y, m-1, 1);
      const last  = new Date(y, m, 0);
      const dow = first.getDay() === 0 ? 6 : first.getDay() - 1;
      const mon = new Date(first); mon.setDate(first.getDate() - dow);

      this.weeks = [];
      let n=1, cur=new Date(mon);
      while (cur <= last) {
        const sun = new Date(cur); sun.setDate(cur.getDate()+6);
        if (sun >= first) {
          const monStr = fmtDate(cur);
          const label = `${n}째주  ${cur.getMonth()+1}/${cur.getDate()}(${DAYS_KO[cur.getDay()===0?6:cur.getDay()-1]}) ~ ${sun.getMonth()+1}/${sun.getDate()}(${DAYS_KO[sun.getDay()===0?6:sun.getDay()-1]})`;
          this.weeks.push({ n, label, monday: monStr, sun: fmtDate(sun) });
        }
        cur.setDate(cur.getDate()+7); n++;
      }

      if (!this.meta.weekLabel && this.weeks.length) {
        const today = todayStr();
        const cur2 = this.weeks.find(w => w.monday <= today && today <= w.sun);
        this.meta.weekLabel = (cur2 || this.weeks[0]).label;
        this.currentMonday  = (cur2 || this.weeks[0]).monday;
      }
    },

    onWeekChange() {
      const w = this.weeks.find(w => w.label === this.meta.weekLabel);
      if (w) this.currentMonday = w.monday;
    },

    // ── 기록 로드 ──────────────────────────────────────────────────────
    async loadRecords() {
      if (!this.currentMonday) { this.showToast('주차를 선택하세요'); return; }
      try {
        const q = new URLSearchParams({ site_code: this.meta.siteCode, week_monday: this.currentMonday });
        const r = await fetch('/api/records?'+q);
        const d = await r.json();
        this.records = d.records || [];
        this.buildWeekGroups();
        this.calcKpi();
        this.showToast(`✅ ${this.records.length}건 불러옴`);
        this.$nextTick(() => this.drawCharts());
      } catch(e) { this.showToast('❌ 로드 실패: '+e.message); }
    },

    // ── 주별 그룹화 ────────────────────────────────────────────────────
    buildWeekGroups() {
      const mondays = [...new Set(this.records.map(r=>r.week_monday).filter(Boolean))].sort();
      if (mondays.length===0 && this.currentMonday) mondays.push(this.currentMonday);

      this.weekGroups = mondays.map(monday => {
        const mon = new Date(monday);
        const wkRecs = this.records.filter(r=>r.week_monday===monday);
        const photos = wkRecs.filter(r=>r.photo_id).map(r=>({
          photo_id: r.photo_id, slot: r.slot,
          dateLabel: dateLabelOf(r.measure_date),
          temperature: r.temperature, humidity: r.humidity,
        }));

        const recMap = {};
        wkRecs.forEach(r => { recMap[r.measure_date+'_'+r.slot] = r; });

        const gridRows = [];
        for (let di=0; di<7; di++) {
          const d = new Date(monday); d.setDate(mon.getDate()+di);
          const ds = fmtDate(d);
          SLOTS.forEach(slot => {
            const existing = recMap[ds+'_'+slot];
            gridRows.push(existing ? { ...existing, key:ds+'_'+slot, dateLabel:dateLabelOf(ds) }
              : { key:ds+'_'+slot, measure_date:ds, slot, week_monday:monday,
                  dateLabel:dateLabelOf(ds), measure_time:'', temperature:null,
                  humidity:null, feels_like:null, heat_level:'', action:'N/A',
                  other_content:'', notes:'', measurer:this.meta.measurer, photo_id:'', id:null });
          });
        }

        return { monday, label: formatMondayLabel(monday), records: wkRecs, gridRows, photos };
      });
    },

    calcKpi() {
      const temps  = this.records.map(r=>r.temperature).filter(v=>v!=null);
      const feels  = this.records.map(r=>r.feels_like).filter(v=>v!=null);
      const humids = this.records.map(r=>r.humidity).filter(v=>v!=null);
      this.kpi = {
        maxTemp:  temps.length  ? Math.max(...temps).toFixed(1)+'°C' : '-',
        maxHumid: humids.length ? Math.max(...humids).toFixed(0)+'%' : '-',
        maxFeels: feels.length  ? Math.max(...feels).toFixed(1)+'°C' : '-',
      };
    },

    // ── 차트 ──────────────────────────────────────────────────────────
    drawCharts() {
      this.weekGroups.forEach((wk, wi) => {
        const canvas = document.getElementById('chart-'+wi);
        if (!canvas) return;
        if (canvas._chartInst) { canvas._chartInst.destroy(); }
        const dayLabels = [];
        const mon = new Date(wk.monday);
        for (let i=0;i<7;i++) {
          const d = new Date(mon); d.setDate(mon.getDate()+i);
          dayLabels.push(`${d.getMonth()+1}/${d.getDate()}(${DAYS_KO[d.getDay()===0?6:d.getDay()-1]})`);
        }
        const colors = {"오전1":"#4A90E2","오전2":"#34C759","오후1":"#FF9500","오후2":"#FF3B30"};
        const datasets = SLOTS.map(slot => ({
          label: slot, backgroundColor: colors[slot]+'cc',
          data: dayLabels.map((_,di) => {
            const d = new Date(wk.monday); d.setDate(new Date(wk.monday).getDate()+di);
            const r = wk.records.find(r=>r.measure_date===fmtDate(d) && r.slot===slot);
            return r?.feels_like ?? null;
          }),
        }));
        const allVals = wk.records.map(r=>r.feels_like).filter(v=>v!=null);
        canvas._chartInst = new Chart(canvas, {
          type: 'bar',
          data: { labels: dayLabels, datasets },
          options: {
            responsive:true, maintainAspectRatio:false,
            plugins: { legend:{ position:'top', labels:{ boxWidth:11, font:{size:10} } } },
            scales: {
              y: { min: allVals.length?Math.min(...allVals)-3:25,
                   max: allVals.length?Math.max(...allVals)+4:42,
                   title:{ display:true, text:'체감온도(°C)', font:{size:10} } }
            }
          }
        });
      });
    },

    // ── 행 자동 저장 ──────────────────────────────────────────────────
    async autoSaveRow(row, weekMonday) {
      if (row.temperature == null && row.humidity == null) return;
      const payload = {
        site_code: this.meta.siteCode, site_name: this.meta.siteName,
        company: this.meta.company,    location: this.meta.location,
        measurer: row.measurer || this.meta.measurer,
        measure_date: row.measure_date, slot: row.slot,
        week_monday: weekMonday,
        measure_time: row.measure_time, temperature: row.temperature,
        humidity: row.humidity, feels_like: row.feels_like,
        heat_level: row.heat_level, action: row.action,
        other_content: row.other_content, notes: row.notes,
        photo_id: row.photo_id||'',
      };
      try {
        const method = row.id ? 'PUT' : 'POST';
        const url = row.id ? `/api/records/${row.id}` : '/api/records';
        const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        const d = await res.json();
        if (!row.id && d.id) row.id = d.id;
        if (!this.records.find(r=>r.id===row.id)) {
          this.records.push({...payload, id:row.id});
        } else {
          Object.assign(this.records.find(r=>r.id===row.id), payload);
        }
        this.calcKpi();
      } catch(e) { this.showToast('❌ 저장 실패'); }
    },

    recalcRow(row) {
      if (row.temperature != null && row.humidity != null) {
        row.feels_like = heatIndex(row.temperature, row.humidity);
        row.heat_level  = heatLabel(row.feels_like);
        if (!row.action || row.action==='N/A') {
          row.action = row.feels_like >= 31 ? '추가휴식시간부여' : 'N/A';
        }
      } else {
        row.feels_like = null; row.heat_level = '';
      }
    },

    async deleteRow(row, wkInfo) {
      if (!row.id) return;
      if (!confirm('이 기록을 삭제하시겠습니까?')) return;
      await fetch(`/api/records/${row.id}`, { method:'DELETE' });
      this.records = this.records.filter(r=>r.id!==row.id);
      wkInfo.records = wkInfo.records.filter(r=>r.id!==row.id);
      row.id=null; row.temperature=null; row.humidity=null; row.feels_like=null;
      row.heat_level=''; row.measure_time=''; row.action='N/A';
      this.calcKpi();
      this.showToast('삭제 완료');
    },

    // ── 카메라 탭 ─────────────────────────────────────────────────────
    onCameraCapture(e) {
      const file = e.target.files[0];
      if (!file) return;
      _camFile = file;
      this.cam.preview = URL.createObjectURL(file);
    },

    async addCameraPhoto() {
      if (!_camFile) { this.showToast('촬영된 사진이 없습니다'); return; }
      if (!this.currentMonday) { this.showToast('아래에서 주차를 먼저 선택하세요'); return; }
      const fname = `camera_${this.cam.date}.jpg`;
      const file = _camFile;
      _camFile = null;
      this.cam.preview = null;
      document.getElementById('cam-input').value = '';
      await this.enqueueFile(file, fname, this.cam.date, '오전1', this.currentMonday);
      this.showToast('📸 사진 추가됨 — AI 추출 후 구분 자동 판정');
    },

    // ── 업로드 탭 ─────────────────────────────────────────────────────
    onFileSelect(files) {
      [...files].forEach(f => {
        const d = parseDateFromFilename(f.name) || todayStr();
        const s = parseSlotFromFilename(f.name); // 파일명 힌트 (AI 추출 시 갱신)
        this.enqueueFile(f, f.name, d, s, calcMonday(d));
      });
    },

    onDrop(e) {
      e.currentTarget.classList.remove('dragover');
      this.onFileSelect(e.dataTransfer.files);
    },

    // ── 기간 조회 탭 ──────────────────────────────────────────────────
    async loadAvailableWeeks() {
      try {
        const q = new URLSearchParams({ site_code: this.meta.siteCode });
        const r = await fetch('/api/weeks?'+q);
        const d = await r.json();
        this.hist.availableWeeks = d.weeks || [];
      } catch {}
    },

    async loadHistoryWeekInfo() {
      if (!this.hist.selectedWeek) return;
      const q = new URLSearchParams({ site_code: this.meta.siteCode, week_monday: this.hist.selectedWeek });
      const r = await fetch('/api/records?'+q);
      const d = await r.json();
      const recs = d.records || [];
      const temps = recs.map(r=>r.temperature).filter(v=>v!=null);
      const feels = recs.map(r=>r.feels_like).filter(v=>v!=null);
      this.hist.summary = recs.length ? {
        count: recs.length,
        maxTemp:  temps.length ? Math.max(...temps).toFixed(1)+'°C' : '-',
        maxFeels: feels.length ? Math.max(...feels).toFixed(1)+'°C' : '-',
      } : null;
    },

    async loadHistoryWeek() {
      if (!this.hist.selectedWeek) { this.showToast('기간을 선택하세요'); return; }
      const q = new URLSearchParams({ site_code: this.meta.siteCode, week_monday: this.hist.selectedWeek });
      const r = await fetch('/api/records?'+q);
      const d = await r.json();
      const newRecs = (d.records||[]).filter(nr => !this.records.find(er=>er.id===nr.id));
      this.records = [...this.records, ...newRecs];
      this.buildWeekGroups();
      this.calcKpi();
      this.showToast(`✅ ${newRecs.length}건 불러옴`);
      this.$nextTick(()=>this.drawCharts());
    },

    onHistFileSelect(files) {
      if (!this.hist.selectedWeek) { this.showToast('먼저 기간을 선택하세요'); return; }
      [...files].forEach(f => {
        const d = parseDateFromFilename(f.name) || this.hist.selectedWeek;
        const s = parseSlotFromFilename(f.name);
        this.enqueueFile(f, f.name, d, s, this.hist.selectedWeek);
      });
    },

    // ── 큐 관리 ───────────────────────────────────────────────────────
    async enqueueFile(file, fname, dateStr, slot, weekMonday) {
      const id = crypto.randomUUID();
      const preview = URL.createObjectURL(file);
      this.queue.push({ id, filename:fname, date:dateStr, slot, weekMonday,
                        preview, status:'uploading', photo_id:null, result:null });

      try {
        const fd = new FormData(); fd.append('file', file, fname);
        const r = await fetch('/api/photos/upload', { method:'POST', body:fd });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const d = await r.json();
        const qItem = this.queue.find(q => q.id === id);
        if (qItem) { qItem.photo_id = d.photo_id; qItem.status = 'pending'; }
      } catch(e) {
        const qItem = this.queue.find(q => q.id === id);
        if (qItem) qItem.status = 'error';
        this.showToast('❌ 업로드 실패: '+e.message);
      }
    },

    removeFromQueue(i) { this.queue.splice(i, 1); },
    clearQueue() { this.queue = []; },

    // ── AI 자동 추출 (시간 → 측정구분 자동 판정) ──────────────────────
    async extractAll() {
      const pending = this.queue.filter(q=>q.status==='pending' && q.photo_id);
      if (!pending.length) { this.showToast('추출할 항목이 없습니다'); return; }
      this.isExtracting = true;
      this.extractProgress = 0;
      this.extractStatus = `⏳ ${pending.length}장 추출 중...`;

      for (let i=0; i<pending.length; i++) {
        const item = pending[i];
        try {
          const r = await fetch('/api/photos/extract', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ photo_id: item.photo_id })
          });
          if (!r.ok) throw new Error(await r.text());
          item.result = await r.json();
          // 추출된 시간으로 측정 구분 자동 판정
          const detectedSlot = slotFromTime(item.result?.time);
          if (detectedSlot) item.slot = detectedSlot;
          item.status = 'done';
        } catch(e) {
          item.status = 'error';
        }
        this.extractProgress = Math.round((i+1)/pending.length*100);
        this.extractStatus = `⏳ ${i+1}/${pending.length} – ${item.filename}`;
      }
      this.isExtracting = false;
      this.extractStatus = '✅ 추출 완료';
      this.showToast('✅ AI 추출 완료 — 측정 구분 자동 판정됨');
    },

    // ── 큐 → DB 저장 ──────────────────────────────────────────────────
    async saveQueueToRecords() {
      const done = this.queue.filter(q=>q.status==='done' && q.result);
      let saved = 0;
      for (const item of done) {
        const r = item.result;
        const payload = {
          site_code: this.meta.siteCode,   site_name: this.meta.siteName,
          company:   this.meta.company,    location:  this.meta.location,
          measurer:  this.meta.measurer,
          measure_date: item.date,         slot: item.slot,
          week_monday:  item.weekMonday,
          measure_time: r.time||'',
          temperature:  r.temperature,     humidity:  r.humidity,
          feels_like:   r.feels_like,      heat_level: r.heat_level||'',
          action:    r.action||'N/A',      other_content:'', notes:'',
          photo_id:  item.photo_id,
        };
        try {
          const res = await fetch('/api/records', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify(payload)
          });
          const d = await res.json();
          const existing = this.records.find(r=>r.measure_date===item.date && r.slot===item.slot && r.week_monday===item.weekMonday);
          if (existing) Object.assign(existing, {...payload, id:d.id});
          else this.records.push({...payload, id:d.id});
          saved++;
        } catch {}
      }
      this.buildWeekGroups();
      this.calcKpi();
      this.queue = this.queue.filter(q=>q.status!=='done');
      await this.loadAvailableWeeks();
      this.showToast(`✅ ${saved}건 저장 완료`);
      this.$nextTick(()=>this.drawCharts());
    },

    downloadExcel(monday) {
      const q = new URLSearchParams({ site_code: this.meta.siteCode, week_monday: monday });
      window.location.href = '/api/excel?'+q;
    },

    formatMonday(m) { return formatMondayLabel(m); },

    showToast(msg, ms=2800) {
      this.toast = { show:true, msg };
      setTimeout(() => { this.toast.show=false; }, ms);
    },
  };
}

// ── 유틸 함수 ─────────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dateLabelOf(ds) {
  const d = new Date(ds+'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}(${DAYS_KO[d.getDay()===0?6:d.getDay()-1]})`;
}

function calcMonday(ds) {
  const d = new Date(ds+'T00:00:00');
  const dow = d.getDay()===0?6:d.getDay()-1;
  d.setDate(d.getDate()-dow);
  return fmtDate(d);
}

function parseDateFromFilename(name) {
  let m = name.match(/(?<!\d)(20\d{2})(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])(?!\d)/);
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  m = name.match(/(20\d{2})[-./](0[1-9]|1[0-2])[-./](0[1-9]|[12]\d|3[01])/);
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  return null;
}

function parseSlotFromFilename(name) {
  const m = name.match(/\((\d+)\)/);
  if (m) return {1:'오전1',2:'오전2',3:'오후1',4:'오후2'}[parseInt(m[1])] || '오전1';
  return '오전1';
}

// AI 추출 시간 → 측정 구분 자동 판정
// 07:00~09:30 → 오전1 / 10:00~12:00 → 오전2 / 12:30~14:00 → 오후1 / 14:30~16:00 → 오후2
function slotFromTime(timeStr) {
  if (!timeStr || timeStr === 'null') return null;
  const parts = timeStr.split(':');
  if (parts.length < 2) return null;
  const mins = parseInt(parts[0], 10) * 60 + (parseInt(parts[1], 10) || 0);
  if (mins >= 420 && mins <= 570) return '오전1';   // 07:00~09:30
  if (mins >= 600 && mins <= 720) return '오전2';   // 10:00~12:00
  if (mins >= 750 && mins <= 840) return '오후1';   // 12:30~14:00
  if (mins >= 870 && mins <= 960) return '오후2';   // 14:30~16:00
  return null;
}

function formatMondayLabel(mondayStr) {
  const d = new Date(mondayStr+'T00:00:00');
  const sun = new Date(d); sun.setDate(d.getDate()+6);
  const first = new Date(d.getFullYear(), d.getMonth(), 1);
  const firstDow = first.getDay()===0 ? 6 : first.getDay()-1;
  const firstMon = new Date(first); firstMon.setDate(1 - firstDow);
  const diffDays = Math.floor((d - firstMon) / 86400000);
  const wkN = Math.floor(diffDays / 7) + 1;
  const names=['첫째','둘째','셋째','넷째','다섯째'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${names[Math.min(wkN-1,4)]}주 `
       + `(${d.getMonth()+1}/${d.getDate()}~${sun.getMonth()+1}/${sun.getDate()})`;
}

function heatIndex(Ta, RH) {
  const Tw = (Ta * Math.atan(0.151977*Math.sqrt(RH+8.313659))
    + Math.atan(Ta+RH) - Math.atan(RH-1.67633)
    + 0.00391838*Math.pow(RH,1.5)*Math.atan(0.023101*RH) - 4.686035);
  return Math.round((-0.2442+0.55399*Tw+0.45535*Ta-0.0022*Tw*Tw+0.00278*Tw*Ta+3.0)*10)/10;
}

function heatLabel(hi) {
  if (hi>=38) return '위험';
  if (hi>=35) return '경고';
  if (hi>=33) return '주의';
  if (hi>=31) return '관심';
  return '-';
}
