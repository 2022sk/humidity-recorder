<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>체감온도 기록관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nanum+Square:wght@400;700;800&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@2.0/nanumsquare.css">
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  [x-cloak]{display:none!important}
  body{font-family:'Nanum Square','NanumSquare','Apple SD Gothic Neo','맑은 고딕',sans-serif;background:#f5f5f7}
  .card{background:white;border-radius:14px;padding:16px 18px;box-shadow:0 1px 8px rgba(0,0,0,.07);border:1px solid #e8e8ed}
  .kpi-card{background:white;border:1px solid #e8e8ed;border-radius:13px;padding:12px;text-align:center}
  .kpi-val{font-size:1.4rem;font-weight:800;color:#1c1c1e}
  .kpi-lbl{font-size:.68rem;color:#86868b;margin-top:2px}
  .btn-primary{background:#0071e3;color:white;border-radius:10px;padding:9px 16px;font-weight:700;font-size:.85rem;cursor:pointer;transition:background .15s;border:none;font-family:inherit}
  .btn-primary:hover{background:#005bbf}
  .btn-primary:disabled{background:#b0b0b5;cursor:not-allowed}
  .btn-secondary{background:#f2f2f7;color:#1c1c1e;border-radius:10px;padding:9px 14px;font-weight:700;font-size:.85rem;cursor:pointer;transition:background .15s;border:none;font-family:inherit}
  .btn-secondary:hover{background:#e5e5ea}
  input,select,textarea{box-sizing:border-box;border:1px solid #d1d5db;border-radius:12px;padding:12px 16px 12px 14px!important;font-size:.85rem!important;line-height:1.4;width:100%;max-width:100%;min-width:0;outline:none;transition:border-color .15s;font-family:inherit}
  input[type="date"]{-webkit-appearance:none;appearance:none;min-width:0}
  input:focus,select:focus,textarea:focus{border-color:#0071e3;box-shadow:0 0 0 3px rgba(0,113,227,.12)}
  input::placeholder,textarea::placeholder{font-size:.85rem!important;color:#b0b0b8}
  .tab-btn{transition:all .2s;border-radius:9px;padding:8px 10px;font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap;border:none;background:transparent;font-family:inherit}
  .tab-btn.active{background:white;box-shadow:0 1px 6px rgba(0,0,0,.12);color:#0071e3}
  .tab-btn:not(.active){color:#86868b}
  .tab-btn:not(.active):hover{background:rgba(255,255,255,.6)}
  .drop-zone{border:2px dashed #c7c7cc;border-radius:13px;padding:28px 16px;text-align:center;background:#fafafa;cursor:pointer;transition:all .2s}
  .drop-zone:hover,.drop-zone.dragover{border-color:#0071e3;background:#f0f5ff}
  .badge-위험{background:#ff3b30;color:white;padding:2px 7px;border-radius:5px;font-size:.72rem;font-weight:800}
  .badge-경고{background:#ff9500;color:white;padding:2px 7px;border-radius:5px;font-size:.72rem;font-weight:800}
  .badge-주의{background:#ffcc00;color:#1c1c1e;padding:2px 7px;border-radius:5px;font-size:.72rem;font-weight:800}
  .badge-관심{background:#34c759;color:white;padding:2px 7px;border-radius:5px;font-size:.72rem;font-weight:800}
  .week-tag{display:inline-block;background:#0071e3;color:white;border-radius:8px;padding:3px 12px;font-size:.8rem;font-weight:700}
  .grid-table{border-collapse:collapse;font-size:.82rem}
  .grid-table th{background:#0071e3;color:white;padding:7px 8px;text-align:center;font-weight:700;font-size:.82rem;overflow:hidden}
  .grid-table td{padding:4px 5px;border-right:1px solid #e8e8ed;border-bottom:1px solid #e8e8ed;vertical-align:middle;overflow:hidden;white-space:nowrap}
  .grid-table tr.day-sep td{border-top:2px solid #c7c7cc}
  .grid-table tr:hover td{background:#f0f5ff}
  .grid-table input,.grid-table select{border:none;background:transparent;padding:3px 6px!important;font-size:.82rem!important;border-radius:4px;font-family:inherit;width:100%;box-sizing:border-box;white-space:nowrap}
  .grid-table input:focus,.grid-table select:focus{background:white;border:1px solid #0071e3;box-shadow:0 0 0 2px rgba(0,113,227,.1)}
  .heat-dot{display:inline-block;width:9px;height:9px;border-radius:50%;flex-shrink:0;vertical-align:middle;margin-right:3px}
  .photo-thumb{width:72px;height:72px;object-fit:cover;border-radius:8px;border:2px solid #e8e8ed}
  .progress-bar{height:4px;background:#e8e8ed;border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:#0071e3;transition:width .3s}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:#f1f1f1}
  ::-webkit-scrollbar-thumb{background:#c7c7cc;border-radius:3px}
</style>
</head>

<body x-data="app()" x-init="init()" x-cloak>

<!-- ── 고정 상단 헤더 ──────────────────────────────────────────────────────── -->
<header class="sticky top-0 z-40" style="background:linear-gradient(135deg,#0062cc,#0071e3,#0096c7);box-shadow:0 2px 12px rgba(0,100,200,.2)">
  <div class="max-w-3xl mx-auto px-4" style="padding-top:14px;padding-bottom:14px">
    <div class="flex items-start justify-between">
      <div>
        <div class="flex items-center gap-2 mb-1">
          <span class="text-lg">🌡</span>
          <h1 class="font-extrabold text-white" style="font-size:1.15rem;letter-spacing:-.02em">체감온도 기록관리</h1>
        </div>
        <div class="pl-7 leading-tight">
          <template x-if="meta.siteCode || meta.siteName || meta.company || meta.location">
            <div class="flex flex-wrap items-center gap-x-1.5 gap-y-1">
              <template x-if="meta.siteCode">
                <span class="text-xs px-1.5 py-0.5 rounded font-bold"
                      style="background:rgba(255,255,255,.2);color:white;border:1px solid rgba(255,255,255,.3)"
                      x-text="meta.siteCode"></span>
              </template>
              <template x-if="meta.siteName">
                <span class="text-xs px-1.5 py-0.5 rounded font-bold"
                      style="background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.25)"
                      x-text="meta.siteName"></span>
              </template>
              <template x-if="meta.company">
                <span class="text-xs" style="color:rgba(255,255,255,.75)" x-text="meta.company"></span>
              </template>
              <template x-if="meta.location">
                <span class="text-xs" style="color:rgba(255,255,255,.75)" x-text="'📍'+meta.location"></span>
              </template>
            </div>
          </template>
          <template x-if="!meta.siteCode && !meta.siteName && !meta.company && !meta.location">
            <span class="text-xs" style="color:rgba(255,255,255,.6)">현장 기본 정보를 입력하세요</span>
          </template>
        </div>
      </div>
      <span class="text-xs font-bold mt-1 px-2 py-1 rounded-lg"
            style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25)"
            :style="apiOk ? 'color:white' : 'color:#ffd0d0'"
            :title="apiOk ? 'Gemini AI 연결됨' : 'API 키 미설정'"
            x-text="apiOk ? '✅ AI' : '❌ AI'"></span>
    </div>
  </div>
</header>

<div class="max-w-3xl mx-auto p-3 space-y-3 pb-10">

  <!-- ══ 현장 기본 정보 ═══════════════════════════════════════════════════ -->
  <div class="card">
    <div class="text-xs font-extrabold text-blue-600 mb-3">🏗 현장 기본 정보</div>
    <div class="grid grid-cols-2 gap-2 mb-2">
      <div>
        <label class="text-xs text-gray-500 font-bold">현장코드</label>
        <input type="text" x-model="meta.siteCode" placeholder="예: J881"
               @input="meta.siteCode = meta.siteCode.toUpperCase()"
               @change="onSiteCodeChange" list="site-code-list" class="mt-1">
        <datalist id="site-code-list">
          <template x-for="s in ac.siteCodes" :key="s.code">
            <option :value="s.code" :label="s.name"></option>
          </template>
        </datalist>
      </div>
      <div>
        <label class="text-xs text-gray-500 font-bold">현장명</label>
        <input type="text" x-model="meta.siteName" placeholder="현장명" list="site-name-list" class="mt-1">
        <datalist id="site-name-list">
          <template x-for="s in ac.siteCodes" :key="s.name">
            <option :value="s.name"></option>
          </template>
        </datalist>
      </div>
      <div>
        <label class="text-xs text-gray-500 font-bold">업체명</label>
        <input type="text" x-model="meta.company" placeholder="업체명" list="company-list" class="mt-1">
        <datalist id="company-list">
          <template x-for="c in ac.companies" :key="c">
            <option :value="c"></option>
          </template>
        </datalist>
      </div>
      <div>
        <label class="text-xs text-gray-500 font-bold">온습도계 위치</label>
        <input type="text" x-model="meta.location" placeholder="예: GATE 2" list="loc-list" class="mt-1">
        <datalist id="loc-list">
          <template x-for="l in ac.locations" :key="l">
            <option :value="l"></option>
          </template>
        </datalist>
      </div>
    </div>
    <div>
      <label class="text-xs text-gray-500 font-bold">측정자</label>
      <input type="text" x-model="meta.measurer" placeholder="홍길동" @change="saveMeasurer" class="mt-1">
    </div>
  </div>

  <!-- ══ 사진 등록 탭 ══════════════════════════════════════════════════════ -->
  <div class="card relative">
    <template x-if="!meta.siteCode || !meta.siteName">
      <div class="absolute inset-0 rounded-xl z-10 flex flex-col items-center justify-center gap-2"
           style="background:rgba(255,255,255,.88);backdrop-filter:blur(3px)">
        <div class="text-4xl">🏗</div>
        <div class="font-bold text-sm text-gray-600">현장코드를 먼저 입력해주세요</div>
        <div class="text-xs text-gray-400">현장 기본 정보를 입력하면 활성화됩니다</div>
      </div>
    </template>
    <div class="flex gap-1 bg-gray-100 p-1 rounded-xl mb-4">
      <button class="tab-btn flex-1" :class="{active:activeTab==='camera'}"  @click="activeTab='camera'">📸 촬영</button>
      <button class="tab-btn flex-1" :class="{active:activeTab==='upload'}"  @click="activeTab='upload'">📁 업로드</button>
      <button class="tab-btn flex-1" :class="{active:activeTab==='history'}" @click="activeTab='history'">📋 이전 기록</button>
    </div>

    <!-- ── 카메라 탭: 촬영 → 즉시 AI 추출 → 수정 → 저장 ── -->
    <div x-show="activeTab==='camera'">
      <template x-if="!cam.preview">
        <div>
          <div class="mb-3">
            <label class="text-xs text-gray-500 font-bold">촬영 날짜</label>
            <input type="date" x-model="cam.date" class="mt-1">
          </div>
          <label class="drop-zone block cursor-pointer">
            <input type="file" accept="image/*" :capture="isMobile ? 'environment' : false"
                   class="hidden" @change="onCameraCapture">
            <div class="text-4xl mb-2" x-text="isMobile ? '📷' : '🖼️'"></div>
            <div class="font-bold text-gray-700" x-text="isMobile ? '온습도계 사진 촬영' : '사진 파일 선택'"></div>
            <div class="text-xs text-gray-400 mt-1"
                 x-text="isMobile ? '탭하면 후면 카메라가 열립니다' : 'PC에서는 파일 선택창이 열립니다 (업로드 탭과 동일)'"></div>
          </label>
        </div>
      </template>

      <template x-if="cam.preview">
        <div>
          <div class="flex gap-3 items-start mb-3">
            <img :src="cam.preview" class="w-32 h-32 object-cover rounded-xl border-2 border-blue-200 flex-shrink-0">
            <div class="flex-1">
              <div class="text-xs text-gray-500 mb-1">📅 <span x-text="cam.date"></span></div>
              <template x-if="cam.extracting">
                <div class="text-sm text-blue-600 font-bold animate-pulse">🤖 AI 분석 중...</div>
              </template>
              <template x-if="cam.error">
                <div class="text-sm text-red-500 font-bold" x-text="'❌ '+cam.error"></div>
              </template>
              <template x-if="!cam.extracting && !cam.error && cam.result">
                <div class="text-xs text-green-600 font-bold">✅ 추출 완료 — 아래에서 확인·수정 후 저장</div>
              </template>
              <button @click="resetCam()" class="btn-secondary text-xs py-1 px-3 mt-2">↩ 다시 촬영</button>
            </div>
          </div>

          <template x-if="cam.result">
            <div>
              <div class="bg-gray-50 rounded-xl p-3 space-y-2 mb-3">
                <div class="text-xs font-extrabold text-gray-600 mb-2">측정값 확인 및 수정</div>
                <div class="grid grid-cols-2 gap-2">
                  <div>
                    <label class="text-xs text-gray-400">온도 (°C)</label>
                    <input type="number" step="0.1" x-model.number="cam.result.temperature"
                           @input="camRecalc()" class="mt-1">
                  </div>
                  <div>
                    <label class="text-xs text-gray-400">습도 (%)</label>
                    <input type="number" step="1" x-model.number="cam.result.humidity"
                           @input="camRecalc()" class="mt-1">
                  </div>
                  <div>
                    <label class="text-xs text-gray-400">측정시각</label>
                    <input type="text" placeholder="HH:MM" x-model="cam.result.time"
                           @change="camRecalc()" class="mt-1">
                  </div>
                  <div>
                    <label class="text-xs text-gray-400">측정 구분 (자동)</label>
                    <input type="text" :value="cam.result.slot||'(시간 미인식)'"
                           class="mt-1 bg-blue-50 text-blue-700 font-bold" readonly>
                  </div>
                </div>
                <template x-if="cam.result.feels_like != null">
                  <div class="flex items-center gap-3 pt-1 border-t border-gray-200">
                    <span class="text-xs text-gray-500">체감온도</span>
                    <span class="text-lg font-extrabold text-orange-500" x-text="cam.result.feels_like+'°C'"></span>
                    <span x-show="cam.result.heat_level && cam.result.heat_level!=='-'"
                          :class="'badge-'+cam.result.heat_level"
                          x-text="cam.result.heat_level"></span>
                  </div>
                </template>
                <div>
                  <label class="text-xs text-gray-400">조치사항</label>
                  <select x-model="cam.result.action" class="mt-1">
                    <option>N/A</option><option>추가휴식시간부여</option><option>보냉장구지급</option>
                    <option>작업시간대조정</option><option>작업중지</option><option>기타</option>
                  </select>
                </div>
              </div>
              <button @click="saveCamDirect()" class="btn-primary w-full"
                      :disabled="cam.saving || !meta.siteCode || !meta.location"
                      x-text="cam.saving ? '저장 중...' : '💾 저장'">
              </button>
              <div x-show="!meta.siteCode || !meta.location"
                   class="text-xs text-red-400 text-center mt-1">
                ※ 현장코드와 위치를 입력해야 저장됩니다
              </div>
            </div>
          </template>

          <template x-if="cam.error && !cam.result">
            <div class="text-center py-4">
              <div class="text-xs text-gray-500 mb-2">AI 추출에 실패했습니다. 수동으로 다시 시도해 주세요.</div>
              <button @click="retryExtract('cam')" class="btn-primary text-xs py-2 px-4">🔄 다시 추출</button>
            </div>
          </template>
        </div>
      </template>
    </div>

    <!-- ── 업로드 탭: 일괄 업로드 → AI 자동 추출 → 전체 저장 ── -->
    <div x-show="activeTab==='upload'">
      <div class="mb-3 flex items-center gap-2">
        <label class="text-xs font-bold text-gray-600 whitespace-nowrap">기본 날짜</label>
        <input type="date" x-model="upld.defaultDate" class="flex-1" style="padding:8px 12px!important;font-size:.85rem!important">
        <span class="text-xs text-gray-400 whitespace-nowrap">파일명 날짜 우선</span>
      </div>
      <label class="drop-zone block cursor-pointer mb-3"
             :style="upld.batch.length > 0 ? 'padding:12px' : 'padding:28px 16px'"
             @dragover.prevent="$event.currentTarget.classList.add('dragover')"
             @dragleave="$event.currentTarget.classList.remove('dragover')"
             @drop.prevent="onUploadDrop($event)">
        <input type="file" accept="image/*" multiple class="hidden" @change="onUploadFileSelect($event)">
        <div class="text-2xl mb-1">📁</div>
        <div class="font-bold text-gray-700 text-sm"
             x-text="upld.batch.length > 0 ? '+ 사진 추가' : '클릭하거나 파일을 여기에 드래그'"></div>
        <div class="text-xs text-gray-400 mt-1" x-show="upld.batch.length === 0">
          여러 장 동시 선택 · AI가 자동 추출 · 한 번에 저장
        </div>
      </label>

      <template x-if="upld.batch.length > 0">
        <div>
          <div class="space-y-2 mb-3">
            <template x-for="item in upld.batch" :key="item.id">
              <div class="bg-gray-50 rounded-xl p-3 relative">
                <button @click="removeUpldBatchItem(item.id)"
                        class="absolute top-2 right-2 w-5 h-5 bg-red-100 hover:bg-red-200 text-red-500 rounded-full text-xs flex items-center justify-center">✕</button>
                <div class="flex gap-3">
                  <img :src="item.preview" class="w-20 h-20 object-cover rounded-lg flex-shrink-0 border border-gray-200">
                  <div class="flex-1 min-w-0">
                    <div class="text-xs text-gray-400 truncate mb-1 pr-6" x-text="item.filename"></div>
                    <div x-show="item.uploading" class="text-xs text-blue-500 font-bold animate-pulse">⬆️ 업로드 중...</div>
                    <div x-show="item.extracting" class="text-xs text-blue-600 font-bold animate-pulse">
                      🤖 AI 분석 중... (<span x-text="item.elapsed||0"></span>초)
                    </div>
                    <div x-show="item.error && !item.uploading && !item.extracting" class="space-y-1">
                      <div class="text-xs text-red-500 font-bold" x-text="'❌ '+item.error"></div>
                      <button @click="retryUpldItem(item.id)"
                              class="btn-secondary text-xs py-1 px-2">🔄 다시 분석</button>
                    </div>
                    <template x-if="item.result">
                      <div class="space-y-1.5">
                        <div class="grid grid-cols-2 gap-1.5">
                          <div>
                            <label class="text-xs text-gray-400">온도(°C)</label>
                            <input type="number" step="0.1" x-model.number="item.result.temperature"
                                   @input="upldItemRecalc(item)" class="mt-0.5">
                          </div>
                          <div>
                            <label class="text-xs text-gray-400">습도(%)</label>
                            <input type="number" step="1" x-model.number="item.result.humidity"
                                   @input="upldItemRecalc(item)" class="mt-0.5">
                          </div>
                          <div>
                            <label class="text-xs text-gray-400">측정시각</label>
                            <input type="text" placeholder="HH:MM" x-model="item.result.time"
                                   @change="upldItemRecalc(item)" class="mt-0.5">
                          </div>
                          <div>
                            <label class="text-xs text-gray-400">구분</label>
                            <input type="text" :value="item.result.slot||'미인식'"
                                   class="mt-0.5 bg-blue-50 text-blue-700 font-bold" readonly>
                          </div>
                        </div>
                        <div class="grid grid-cols-2 gap-1.5 items-end">
                          <div>
                            <label class="text-xs text-gray-400">날짜</label>
                            <input type="date" x-model="item.date" class="mt-0.5">
                          </div>
                          <div class="flex items-center gap-1.5 pb-1">
                            <template x-if="item.result.feels_like != null">
                              <div class="flex items-center gap-1.5">
                                <span class="font-extrabold text-orange-500" x-text="item.result.feels_like+'°C'"></span>
                                <span x-show="item.result.heat_level && item.result.heat_level!=='-'"
                                      :class="'badge-'+item.result.heat_level" x-text="item.result.heat_level"></span>
                              </div>
                            </template>
                          </div>
                        </div>
                        <div>
                          <label class="text-xs text-gray-400">조치사항</label>
                          <select x-model="item.result.action" class="mt-0.5">
                            <option>N/A</option><option>추가휴식시간부여</option><option>보냉장구지급</option>
                            <option>작업시간대조정</option><option>작업중지</option><option>기타</option>
                          </select>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>

      <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-orange-500 flex-shrink-0"></span><b>경고</b><span class="text-gray-400">체감 35~38°C</span></div>

<div x-show="toast.show" x-transition
     class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-5 py-3 rounded-xl text-sm font-bold shadow-xl z-50"
     x-text="toast.msg"></div>

<script>
const DAYS_KO = ["월","화","수","목","금","토","일"];
const SLOTS   = ["오전1","오전2","오후1","오후2"];

let _camFile = null;

function app() {
  return {
    meta: {
      siteCode:'', siteName:'', company:'', location:'',
      measurer: localStorage.getItem('measurer')||'',
      year: 2026,
      month: (() => { const m = new Date().getMonth()+1; return m<5?5:m>9?9:m; })(),
      weekLabel:'',
    },
    weeks: [],
    currentMonday: '',
    ac: { siteCodes:[], companies:[], locations:[] },
    activeTab: 'camera',
    isMobile: /Android|iPhone|iPad|iPod/i.test(navigator.userAgent),

    // 카메라 탭 상태
    cam: { date: todayStr(), preview:null, photo_id:null, extracting:false, error:null, result:null, saving:false },

    // 업로드 탭 상태
    upld: { batch: [], saving: false, defaultDate: todayStr() },

    // 큐 (기간 조회 탭 일괄 추가)
    queue: [],
    isExtracting: false,
    extractProgress: 0,
    extractStatus: '',

    records: [],
    hist: { company:'', companies:[], location:'', locations:[] },
    kpi: { maxTemp:'-', maxHumid:'-', maxFeels:'-' },
    weekGroups: [],
    apiOk: false,
    toast: { show:false, msg:'' },

    // ── 초기화 ──────────────────────────────────────────────────────────
    async init() {
      this.buildWeeks();
      await this.loadAutoComplete();
      await this.checkApi();
    },

    saveMeasurer() { localStorage.setItem('measurer', this.meta.measurer); },

    async checkApi() {
      try { const r = await fetch('/api/autocomplete'); this.apiOk = r.ok; }
      catch { this.apiOk = false; }
    },

    async loadAutoComplete() {
      try {
        const q = new URLSearchParams({ site_code: this.meta.siteCode });
        const r = await fetch('/api/autocomplete?' + q);
        if (r.ok) {
          const d = await r.json();
          this.ac = {
            siteCodes: d.site_codes || [],
            companies: d.companies || [],
            locations: d.locations || [],
          };
        }
      } catch {}
    },

    async onSiteCodeChange() {
      this.meta.siteCode = this.meta.siteCode.toUpperCase();
      const found = this.ac.siteCodes.find(s => s.code.toUpperCase() === this.meta.siteCode);
      if (found) {
        this.meta.siteName = found.name;
        if (found.company && !this.meta.company) this.meta.company = found.company;
      }
      await this.loadAutoComplete();
      this.hist.company = ''; this.hist.location = '';
      await this.refreshHistFilters();
    },

    // ── 주차 계산 ──────────────────────────────────────────────────────
    buildWeeks() {
      const y = this.meta.year, m = this.meta.month;
      const first = new Date(y, m-1, 1);
      const last  = new Date(y, m, 0);
      const dow = first.getDay() === 0 ? 6 : first.getDay() - 1;
      const mon = new Date(first); mon.setDate(first.getDate() - dow);
      this.weeks = [];
      let n=1, cur=new Date(mon);
      while (cur <= last) {
        const sun = new Date(cur); sun.setDate(cur.getDate()+6);
        if (sun >= first) {
          const monStr = fmtDate(cur);
          const label = `${n}째주  ${cur.getMonth()+1}/${cur.getDate()}(${DAYS_KO[cur.getDay()===0?6:cur.getDay()-1]}) ~ ${sun.getMonth()+1}/${sun.getDate()}(${DAYS_KO[sun.getDay()===0?6:sun.getDay()-1]})`;
          this.weeks.push({ n, label, monday: monStr, sun: fmtDate(sun) });
        }
        cur.setDate(cur.getDate()+7); n++;
      }
      if (!this.meta.weekLabel && this.weeks.length) {
        const today = todayStr();
        const cur2 = this.weeks.find(w => w.monday <= today && today <= w.sun);
        this.meta.weekLabel = (cur2 || this.weeks[0]).label;
        this.currentMonday  = (cur2 || this.weeks[0]).monday;
      }
    },

    onWeekChange() {
      const w = this.weeks.find(w => w.label === this.meta.weekLabel);
      if (w) this.currentMonday = w.monday;
      this.refreshHistFilters();
    },

    // ── 기록 로드 ──────────────────────────────────────────────────────
    async loadRecords() {
      if (!this.currentMonday) { this.showToast('주차를 선택하세요'); return; }
      try {
        const q = new URLSearchParams({
          site_code: this.meta.siteCode,
          week_monday: this.currentMonday,
          location: this.hist.location,
          company: this.hist.company,
        });
        const r = await fetch('/api/records?'+q);
        const d = await r.json();
        this.records = d.records || [];
        this.buildWeekGroups();
        this.calcKpi();
        this.showToast(`✅ ${this.records.length}건 불러옴`);
        this.$nextTick(() => this.drawCharts());
      } catch(e) { this.showToast('❌ 로드 실패: '+e.message); }
    },

    buildWeekGroups() {
      // Split by (week_monday, location) to avoid date+slot collisions across locations
      const pairMap = new Map();
      this.records.forEach(r => {
        if (!r.week_monday) return;
        const key = r.week_monday + '|' + (r.location || '');
        if (!pairMap.has(key)) pairMap.set(key, { monday: r.week_monday, location: r.location || '' });
      });
      let pairs = [...pairMap.values()].sort((a, b) =>
        a.monday < b.monday ? -1 : a.monday > b.monday ? 1
          : (a.location || '') < (b.location || '') ? -1 : 1
      );
      if (pairs.length === 0 && this.currentMonday)
        pairs = [{ monday: this.currentMonday, location: this.hist.location || '' }];

      this.weekGroups = pairs.map(({ monday, location }) => {
        const mon = new Date(monday);
        const wkRecs = this.records.filter(r => r.week_monday === monday && (r.location || '') === location);
        const photos = wkRecs.filter(r=>r.photo_id).map(r=>({
          photo_id: r.photo_id, slot: r.slot,
          measure_date: r.measure_date,
          dateLabel: dateLabelOf(r.measure_date),
          temperature: r.temperature, humidity: r.humidity,
        }));
        const recMap = {};
        wkRecs.forEach(r => {
          const key = r.measure_date+'_'+r.slot;
          if (!recMap[key]) recMap[key] = [];
          recMap[key].push(r);
        });
        const gridRows = [];
        for (let di=0; di<7; di++) {
          const d = new Date(monday); d.setDate(mon.getDate()+di);
          const ds = fmtDate(d);
          let dayFirstRow = true;
          SLOTS.forEach((slot) => {
            const recs = recMap[ds+'_'+slot] || [];
            const base = { measure_date:ds, slot, week_monday:monday,
                           dateLabel:dateLabelOf(ds), dayIndex:di,
                           measure_time:'', temperature:null, humidity:null, feels_like:null,
                           heat_level:'', action:'N/A', other_content:'', notes:'',
                           measurer:this.meta.measurer, photo_id:'', id:null };
            if (recs.length === 0) {
              gridRows.push({ ...base, key:ds+'_'+slot+'_empty', isFirstSlot:dayFirstRow });
              dayFirstRow = false;
            } else {
              recs.forEach((rec, ri) => {
                gridRows.push({
                  ...base, ...rec,
                  key: ds+'_'+slot+'_'+(rec.id||ri),
                  dayIndex: di,
                  isFirstSlot: dayFirstRow,
                });
                dayFirstRow = false;
              });
            }
          });
        }
        return { monday, label: formatMondayLabel(monday), location, records: wkRecs, gridRows, photos };
      });
    },

    calcKpi() {
      const temps  = this.records.map(r=>r.temperature).filter(v=>v!=null);
      const feels  = this.records.map(r=>r.feels_like).filter(v=>v!=null);
      const humids = this.records.map(r=>r.humidity).filter(v=>v!=null);
      this.kpi = {
        maxTemp:  temps.length  ? Math.max(...temps).toFixed(1)+'°C' : '-',
        maxHumid: humids.length ? Math.max(...humids).toFixed(0)+'%' : '-',
        maxFeels: feels.length  ? Math.max(...feels).toFixed(1)+'°C' : '-',
      };
    },

    drawCharts() {
      this.weekGroups.forEach((wk, wi) => {
        const canvas = document.getElementById('chart-'+wi);
        if (!canvas) return;
        if (canvas._chartInst) { canvas._chartInst.destroy(); }
        const dayLabels = [];
        const mon = new Date(wk.monday);
        for (let i=0;i<7;i++) {
          const d = new Date(mon); d.setDate(mon.getDate()+i);
          dayLabels.push(`${d.getMonth()+1}/${d.getDate()}(${DAYS_KO[d.getDay()===0?6:d.getDay()-1]})`);
        }
        const colors = {"오전1":"#4A90E2","오전2":"#34C759","오후1":"#FF9500","오후2":"#FF3B30"};
        const datasets = SLOTS.map(slot => ({
          label: slot, backgroundColor: colors[slot]+'cc',
          data: dayLabels.map((_,di) => {
            const d = new Date(wk.monday); d.setDate(new Date(wk.monday).getDate()+di);
            const r = wk.records.find(r=>r.measure_date===fmtDate(d) && r.slot===slot);
            return r?.feels_like ?? null;
          }),
        }));
        const allVals = wk.records.map(r=>r.feels_like).filter(v=>v!=null);
        canvas._chartInst = new Chart(canvas, {
          type: 'bar',
          data: { labels: dayLabels, datasets },
          options: {
            responsive:true, maintainAspectRatio:false,
            plugins: { legend:{ position:'top', labels:{ boxWidth:11, font:{size:10} } } },
            scales: {
              y: { min: allVals.length?Math.min(...allVals)-3:25,
                   max: allVals.length?Math.max(...allVals)+4:42,
                   title:{ display:true, text:'체감온도(°C)', font:{size:10} } }
            }
          }
        });
      });
    },

    // ── 행 자동 저장 ──────────────────────────────────────────────────
    async autoSaveRow(row, weekMonday) {
      if (row.temperature == null && row.humidity == null) return;
      const payload = {
        site_code: this.meta.siteCode, site_name: this.meta.siteName,
        company: this.meta.company,    location: this.meta.location,
        measurer: row.measurer || this.meta.measurer,
        measure_date: row.measure_date, slot: row.slot, week_monday: weekMonday,
        measure_time: row.measure_time, temperature: row.temperature,
        humidity: row.humidity, feels_like: row.feels_like,
        heat_level: row.heat_level, action: row.action,
        other_content: row.other_content, notes: row.notes, photo_id: row.photo_id||'',
      };
      try {
        const method = row.id ? 'PUT' : 'POST';
        const url = row.id ? `/api/records/${row.id}` : '/api/records';
        const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        const d = await res.json();
        if (!row.id && d.id) row.id = d.id;
        if (!this.records.find(r=>r.id===row.id)) this.records.push({...payload, id:row.id});
        else Object.assign(this.records.find(r=>r.id===row.id), payload);
        this.calcKpi();
      } catch { this.showToast('❌ 저장 실패'); }
    },

    recalcRow(row) {
      if (row.temperature != null && row.humidity != null) {
        row.feels_like = heatIndex(row.temperature, row.humidity);
        row.heat_level  = heatLabel(row.feels_like);
        if (!row.action || row.action==='N/A') {
          row.action = row.feels_like >= 31 ? '추가휴식시간부여' : 'N/A';
        }
      } else { row.feels_like = null; row.heat_level = ''; }
    },

    async deleteRow(row, wkInfo) {
      if (!row.id) return;
      if (!confirm('이 기록을 삭제하시겠습니까?\n(연결된 사진도 함께 삭제됩니다)')) return;
      await fetch(`/api/records/${row.id}`, { method:'DELETE' });
      if (row.photo_id) {
        wkInfo.photos = wkInfo.photos.filter(p => p.photo_id !== row.photo_id);
      }
      this.records = this.records.filter(r=>r.id!==row.id);
      wkInfo.records = wkInfo.records.filter(r=>r.id!==row.id);
      row.id=null; row.temperature=null; row.humidity=null; row.feels_like=null;
      row.heat_level=''; row.measure_time=''; row.action='N/A'; row.photo_id='';
      this.calcKpi();
      this.showToast('삭제 완료 (사진 포함)');
    },

    async deletePhoto(ph, wkInfo) {
      if (!confirm('이 사진을 삭제하시겠습니까?')) return;
      await fetch(`/api/photos/${ph.photo_id}`, { method:'DELETE' });
      wkInfo.photos = wkInfo.photos.filter(p => p.photo_id !== ph.photo_id);
      const row = wkInfo.gridRows.find(r => r.measure_date === ph.measure_date && r.slot === ph.slot);
      if (row) row.photo_id = '';
      const rec = this.records.find(r => r.photo_id === ph.photo_id);
      if (rec) rec.photo_id = '';
      this.showToast('사진 삭제 완료');
    },

    // ── 카메라 탭 ─────────────────────────────────────────────────────
    async onCameraCapture(e) {
      const file = e.target.files[0];
      if (!file) return;
      _camFile = file;
      this.cam.preview = URL.createObjectURL(file);
      this.cam.result = null;
      this.cam.error  = null;
      this.cam.photo_id = null;
      this.cam.extracting = true;
      try {
        const fname = `camera_${this.cam.date}_${Date.now()}.jpg`;
        const fd = new FormData(); fd.append('file', file, fname);
        const ur = await fetch('/api/photos/upload', { method:'POST', body:fd });
        if (!ur.ok) throw new Error(`업로드 실패 HTTP ${ur.status}`);
        const ud = await ur.json();
        this.cam.photo_id = ud.photo_id;

        const er = await fetch('/api/photos/extract', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ photo_id: ud.photo_id })
        });
        if (!er.ok) throw new Error('AI 추출 실패');
        const extracted = await er.json();
        if (extracted.temperature != null && extracted.humidity != null) {
          extracted.feels_like = heatIndex(extracted.temperature, extracted.humidity);
          extracted.heat_level = heatLabel(extracted.feels_like);
        }
        extracted.slot   = slotFromTime(extracted.time) || null;
        extracted.action = extracted.action || 'N/A';
        this.cam.result  = extracted;
      } catch(err) {
        this.cam.error = err.message;
      } finally {
        this.cam.extracting = false;
      }
    },

    camRecalc() {
      if (!this.cam.result) return;
      const r = this.cam.result;
      if (r.temperature != null && r.humidity != null) {
        r.feels_like = heatIndex(r.temperature, r.humidity);
        r.heat_level = heatLabel(r.feels_like);
      } else { r.feels_like = null; r.heat_level = ''; }
      const s = slotFromTime(r.time);
      if (s) r.slot = s;
    },

    async saveCamDirect() {
      const r = this.cam.result;
      if (!r || !this.meta.siteCode || !this.meta.location) return;
      this.cam.saving = true;
      try {
        await this._saveRecord(r, this.cam.date, this.cam.photo_id);
        this.showToast('✅ 저장 완료!');
        this.resetCam();
      } catch(err) { this.showToast('❌ 저장 실패: '+err.message); }
      finally { this.cam.saving = false; }
    },

    resetCam() {
      this.cam = { date: todayStr(), preview:null, photo_id:null, extracting:false, error:null, result:null, saving:false };
      _camFile = null;
    },

    // ── 업로드 탭 (일괄 처리) ──────────────────────────────────────────
    onUploadFileSelect(e) {
      const files = [...e.target.files].filter(f => f.type.startsWith('image/'));
      e.target.value = '';
      if (files.length) this.addFilesToBatch(files);
    },

    onUploadDrop(e) {
      e.currentTarget.classList.remove('dragover');
      const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
      if (files.length) this.addFilesToBatch(files);
    },

    addFilesToBatch(files) {
      files.forEach(file => {
        const id = crypto.randomUUID();
        const item = {
          id, filename: file.name,
          preview: URL.createObjectURL(file),
          date: parseDateFromFilename(file.name) || this.upld.defaultDate,
          photo_id: null, uploading: true, extracting: false,
          elapsed: 0, error: null, result: null,
        };
        this.upld.batch.push(item);
        (async () => {
          // 업로드
          try {
            const fd = new FormData(); fd.append('file', file, file.name);
            const ur = await fetch('/api/photos/upload', { method:'POST', body:fd });
            if (!ur.ok) throw new Error();
            const ud = await ur.json();
            const bi = this.upld.batch.find(i => i.id === id);
            if (bi) bi.photo_id = ud.photo_id;
          } catch {
            const bi = this.upld.batch.find(i => i.id === id);
            if (bi) { bi.error = '업로드 실패'; bi.uploading = false; }
            return;
          }
          const bi = this.upld.batch.find(i => i.id === id);
          if (bi) bi.uploading = false;
          // AI 추출
          await this._runBatchExtract(id);
        })();
      });
    },

    async _runBatchExtract(id) {
      const TIMEOUT_S = 40;
      const get = () => this.upld.batch.find(i => i.id === id);
      let bi = get(); if (!bi || !bi.photo_id) return;
      bi.error = null; bi.elapsed = 0; bi.extracting = true;
      const timer = setInterval(() => { const b=get(); if(b) b.elapsed++; }, 1000);
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), TIMEOUT_S * 1000);
      try {
        const r = await fetch('/api/photos/extract', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ photo_id: bi.photo_id }),
          signal: ctrl.signal,
        });
        if (!r.ok) throw new Error('추출 실패');
        const ex = await r.json();
        if (ex.temperature != null && ex.humidity != null) {
          ex.feels_like = heatIndex(ex.temperature, ex.humidity);
          ex.heat_level = heatLabel(ex.feels_like);
        }
        ex.slot = slotFromTime(ex.time) || parseSlotFromFilename(bi.filename) || '오전1';
        ex.action = ex.action || 'N/A';
        bi = get(); if (bi) bi.result = ex;
      } catch(e) {
        bi = get();
        if (bi) bi.error = ctrl.signal.aborted
          ? `시간 초과 (${TIMEOUT_S}초) — 다시 분석해 주세요`
          : 'AI 추출 실패 — 다시 분석해 주세요';
      } finally {
        clearInterval(timer); clearTimeout(tid);
        bi = get(); if (bi) bi.extracting = false;
      }
    },

    retryUpldItem(id) { this._runBatchExtract(id); },

    upldItemRecalc(item) {
      if (!item.result) return;
      const r = item.result;
      if (r.temperature != null && r.humidity != null) {
        r.feels_like = heatIndex(r.temperature, r.humidity);
        r.heat_level = heatLabel(r.feels_like);
      } else { r.feels_like = null; r.heat_level = ''; }
      const s = slotFromTime(r.time);
      if (s) r.slot = s;
    },

    removeUpldBatchItem(id) { this.upld.batch = this.upld.batch.filter(i => i.id !== id); },

    async saveAllUpld() {
      if (!this.meta.siteCode || !this.meta.location) return;
      this.upld.saving = true;
      let saved = 0;
      for (const item of this.upld.batch.filter(i => i.result)) {
        try {
          await this._saveRecord(item.result, item.date, item.photo_id);
          saved++;
        } catch(e) { this.showToast('❌ 저장 실패: '+e.message); }
      }
      this.upld.batch = [];
      this.upld.saving = false;
      this.showToast(`✅ ${saved}장 저장 완료!`);
    },

    resetUpld() { this.upld = { batch: [], saving: false, defaultDate: this.upld.defaultDate }; },

    // 재추출 (카메라 탭 에러 후 재시도)
    async retryExtract(tab) {
      if (tab !== 'cam' || !this.cam.photo_id) return;
      this.cam.error = null; this.cam.extracting = true;
      try {
        const er = await fetch('/api/photos/extract', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ photo_id: this.cam.photo_id })
        });
        if (!er.ok) throw new Error('AI 추출 실패');
        const extracted = await er.json();
        if (extracted.temperature != null && extracted.humidity != null) {
          extracted.feels_like = heatIndex(extracted.temperature, extracted.humidity);
          extracted.heat_level = heatLabel(extracted.feels_like);
        }
        extracted.slot = slotFromTime(extracted.time) || null;
        extracted.action = extracted.action || 'N/A';
        this.cam.result = extracted;
      } catch(err) { this.cam.error = err.message; }
      finally { this.cam.extracting = false; }
    },

    // 공통 저장 (cam/upld 모두 사용)
    async _saveRecord(r, date, photo_id) {
      const monday = calcMonday(date);
      const slot   = r.slot || '오전1';
      const payload = {
        site_code: this.meta.siteCode, site_name: this.meta.siteName,
        company: this.meta.company,    location: this.meta.location,
        measurer: this.meta.measurer,
        measure_date: date, slot, week_monday: monday,
        measure_time: r.time || '',
        temperature: r.temperature, humidity: r.humidity,
        feels_like: r.feels_like, heat_level: r.heat_level || '',
        action: r.action || 'N/A', other_content: '', notes: '',
        photo_id: photo_id || '',
      };
      const res = await fetch('/api/records', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();
      this.records.push({...payload, id:d.id});
      this.buildWeekGroups();
      this.calcKpi();
      this.$nextTick(() => this.drawCharts());
    },

    // ── 업체/위치 필터 ──────────────────────────────────────────────────
    async refreshHistFilters() {
      if (!this.meta.siteCode) {
        this.hist.companies = []; this.hist.locations = []; return;
      }
      try {
        const cq = new URLSearchParams({ site_code: this.meta.siteCode, week_monday: this.currentMonday || '' });
        const cr = await fetch('/api/companies?' + cq);
        const cd = await cr.json();
        this.hist.companies = cd.companies || [];
        if (this.hist.companies.length === 1) {
          this.hist.company = this.hist.companies[0];
        } else if (!this.hist.companies.includes(this.hist.company)) {
          this.hist.company = '';
        }
      } catch { this.hist.companies = []; }
      await this._refreshHistLocations();
    },

    async _refreshHistLocations() {
      try {
        const lq = new URLSearchParams({
          site_code: this.meta.siteCode,
          company: this.hist.company,
          week_monday: this.currentMonday || '',
        });
        const lr = await fetch('/api/locations?' + lq);
        const ld = await lr.json();
        this.hist.locations = ld.locations || [];
        if (this.hist.locations.length === 1) {
          this.hist.location = this.hist.locations[0];
        } else if (!this.hist.locations.includes(this.hist.location)) {
          this.hist.location = '';
        }
      } catch { this.hist.locations = []; }
    },

    async onHistCompanyChange() {
      await this._refreshHistLocations();
    },

    onHistFileSelect(files) {
      if (!this.currentMonday) { this.showToast('먼저 기간을 선택하세요'); return; }
      [...files].forEach(f => {
        const d = parseDateFromFilename(f.name) || this.currentMonday;
        const s = parseSlotFromFilename(f.name);
        this.enqueueFile(f, f.name, d, s, this.currentMonday);
      });
    },

    onHistDrop(e) {
      e.currentTarget.classList.remove('dragover');
      this.onHistFileSelect(e.dataTransfer.files);
    },

    // ── 큐 관리 (기간 조회 일괄 추가용) ──────────────────────────────
    async enqueueFile(file, fname, dateStr, slot, weekMonday) {
      const id = crypto.randomUUID();
      const preview = URL.createObjectURL(file);
      this.queue.push({ id, filename:fname, date:dateStr, slot, weekMonday,
                        preview, status:'uploading', photo_id:null, result:null });
      try {
        const fd = new FormData(); fd.append('file', file, fname);
        const r = await fetch('/api/photos/upload', { method:'POST', body:fd });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const d = await r.json();
        const qItem = this.queue.find(q => q.id === id);
        if (qItem) { qItem.photo_id = d.photo_id; qItem.status = 'pending'; }
      } catch(e) {
        const qItem = this.queue.find(q => q.id === id);
        if (qItem) qItem.status = 'error';
        this.showToast('❌ 업로드 실패: '+e.message);
      }
    },

    removeFromQueue(i) { this.queue.splice(i, 1); },
    clearQueue() { this.queue = []; },

    async extractAll() {
      const pending = this.queue.filter(q=>q.status==='pending' && q.photo_id);
      if (!pending.length) { this.showToast('추출할 항목이 없습니다'); return; }
      this.isExtracting = true; this.extractProgress = 0;
      this.extractStatus = `⏳ ${pending.length}장 추출 중...`;
      for (let i=0; i<pending.length; i++) {
        const item = pending[i];
        try {
          const r = await fetch('/api/photos/extract', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ photo_id: item.photo_id })
          });
          if (!r.ok) throw new Error(await r.text());
          item.result = await r.json();
          const detectedSlot = slotFromTime(item.result?.time);
          if (detectedSlot) item.slot = detectedSlot;
          item.status = 'done';
        } catch { item.status = 'error'; }
        this.extractProgress = Math.round((i+1)/pending.length*100);
        this.extractStatus = `⏳ ${i+1}/${pending.length} – ${item.filename}`;
      }
      this.isExtracting = false;
      this.extractStatus = '✅ 추출 완료';
      this.showToast('✅ AI 추출 완료');
    },

    async saveQueueToRecords() {
      const done = this.queue.filter(q=>q.status==='done' && q.result);
      let saved = 0;
      for (const item of done) {
        const r = item.result;
        const payload = {
          site_code: this.meta.siteCode, site_name: this.meta.siteName,
          company: this.meta.company,    location: this.meta.location,
          measurer: this.meta.measurer,
          measure_date: item.date, slot: item.slot, week_monday: item.weekMonday,
          measure_time: r.time||'', temperature: r.temperature, humidity: r.humidity,
          feels_like: r.feels_like, heat_level: r.heat_level||'',
          action: r.action||'N/A', other_content:'', notes:'', photo_id: item.photo_id,
        };
        try {
          const res = await fetch('/api/records', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify(payload)
          });
          const d = await res.json();
          const existing = this.records.find(r=>r.measure_date===item.date && r.slot===item.slot && r.week_monday===item.weekMonday);
          if (existing) Object.assign(existing, {...payload, id:d.id});
          else this.records.push({...payload, id:d.id});
          saved++;
        } catch {}
      }
      this.buildWeekGroups(); this.calcKpi();
      this.queue = this.queue.filter(q=>q.status!=='done');
      this.showToast(`✅ ${saved}건 저장 완료`);
      this.$nextTick(()=>this.drawCharts());
    },

    downloadExcel(monday, location) {
      const q = new URLSearchParams({ site_code: this.meta.siteCode, week_monday: monday, location: location || '' });
      window.location.href = '/api/excel?'+q;
    },

    showToast(msg, ms=2800) {
      this.toast = { show:true, msg };
      setTimeout(() => { this.toast.show=false; }, ms);
    },
  };
}

// ── 유틸 함수 ─────────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dateLabelOf(ds) {
  const d = new Date(ds+'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}(${DAYS_KO[d.getDay()===0?6:d.getDay()-1]})`;
}
function calcMonday(ds) {
  const d = new Date(ds+'T00:00:00');
  const dow = d.getDay()===0?6:d.getDay()-1;
  d.setDate(d.getDate()-dow);
  return fmtDate(d);
}
function parseDateFromFilename(name) {
  // YYYYMMDD 형식 (예: 20260523.jpg)
  const m = name.match(/(20\d{2})(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])/);
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  // YYYY-MM-DD / YYYY.MM.DD 형식
  const m2 = name.match(/(20\d{2})[-./](0[1-9]|1[0-2])[-./](0[1-9]|[12]\d|3[01])/);
  if (m2) return `${m2[1]}-${m2[2]}-${m2[3]}`;
  // YYMMDD 형식 (예: 260523.jpg → 2026-05-23)
  const m3 = name.match(/(?<![0-9])(2\d)(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])(?![0-9])/);
  if (m3) return `20${m3[1]}-${m3[2]}-${m3[3]}`;
  return null;
}
function parseSlotFromFilename(name) {
  const m = name.match(/\((\d+)\)/);
  if (m) return {1:'오전1',2:'오전2',3:'오후1',4:'오후2'}[parseInt(m[1])] || '오전1';
  return '오전1';
}
function slotFromTime(timeStr) {
  if (!timeStr || timeStr === 'null') return null;
  const parts = timeStr.split(':');
  if (parts.length < 2) return null;
  const mins = parseInt(parts[0], 10) * 60 + (parseInt(parts[1], 10) || 0);
  if (mins >= 420 && mins <= 599) return '오전1';
  if (mins >= 600 && mins <= 749) return '오전2';
  if (mins >= 750 && mins <= 869) return '오후1';
  if (mins >= 870 && mins <= 1020) return '오후2';
  return null;
}
function formatMondayLabel(mondayStr) {
  const d = new Date(mondayStr+'T00:00:00');
  const sun = new Date(d); sun.setDate(d.getDate()+6);
  const first = new Date(d.getFullYear(), d.getMonth(), 1);
  const firstDow = first.getDay()===0 ? 6 : first.getDay()-1;
  const firstMon = new Date(first); firstMon.setDate(1 - firstDow);
  const diffDays = Math.floor((d - firstMon) / 86400000);
  const wkN = Math.floor(diffDays / 7) + 1;
  const names=['첫째','둘째','셋째','넷째','다섯째'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${names[Math.min(wkN-1,4)]}주 `
       + `(${d.getMonth()+1}/${d.getDate()}~${sun.getMonth()+1}/${sun.getDate()})`;
}
function heatIndex(Ta, RH) {
  const Tw = (Ta * Math.atan(0.151977*Math.sqrt(RH+8.313659))
    + Math.atan(Ta+RH) - Math.atan(RH-1.67633)
    + 0.00391838*Math.pow(RH,1.5)*Math.atan(0.023101*RH) - 4.686035);
  return Math.round((-0.2442+0.55399*Tw+0.45535*Ta-0.0022*Tw*Tw+0.00278*Tw*Ta+3.0)*10)/10;
}
function heatLabel(hi) {
  if (hi>=38) return '위험';
  if (hi>=35) return '경고';
  if (hi>=33) return '주의';
  if (hi>=31) return '관심';
  return '-';
}
function heatDotStyle(hi) {
  if (hi == null) return 'background:#e5e7eb';
  if (hi >= 38) return 'background:#ff3b30';
  if (hi >= 35) return 'background:#ff9500';
  if (hi >= 33) return 'background:#ffcc00';
  if (hi >= 31) return 'background:#34c759';
  return 'background:white;border:1.5px solid #d1d5db';
}
